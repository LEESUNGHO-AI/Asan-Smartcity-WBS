name: 🔄 Notion WBS 자동 동기화

on:
  schedule:
    # KST 09:00 (UTC 00:00)
    - cron: '0 0 * * *'
    # KST 13:00 (UTC 04:00)
    - cron: '0 4 * * *'
    # KST 18:00 (UTC 09:00)
    - cron: '0 9 * * *'
    # KST 22:00 (UTC 13:00)
    - cron: '0 13 * * *'
  workflow_dispatch:   # 수동 실행 허용

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 파일 커밋 권한

    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 없음 (표준 라이브러리만 사용)
        run: echo "urllib 사용 — 추가 패키지 불필요"

      - name: 🔄 Notion → wbs-data.json 동기화
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python sync_notion.py

      - name: 📊 생성된 데이터 확인
        run: |
          echo "=== data/wbs-data.json 크기 ==="
          wc -c data/wbs-data.json
          echo "=== 항목 수 확인 ==="
          python3 -c "
          import json
          with open('data/wbs-data.json') as f:
              d = json.load(f)
          m = d['meta']
          s = d['summary']
          print(f'생성 시각: {m[\"generatedAtKst\"]}')
          print(f'총 항목: {s[\"total\"]}건 | 완료: {s[\"done\"]} | 진행중: {s[\"inProg\"]}')
          print(f'평균 실적공정률: {s[\"avgActual\"]}%')
          "

      - name: 💾 변경사항 커밋 & 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "WBS Auto Sync Bot"
          git add data/wbs-data.json
          # 변경사항 있을 때만 커밋
          if git diff --staged --quiet; then
            echo "⏭️ 변경사항 없음 — 커밋 스킵"
          else
            NOW=$(date -u -d "+9 hours" "+%Y-%m-%d %H:%M KST" 2>/dev/null || date "+%Y-%m-%d %H:%M KST")
            git commit -m "📊 WBS 자동 업데이트 [$NOW]"
            git push
            echo "✅ 커밋 완료"
          fi
