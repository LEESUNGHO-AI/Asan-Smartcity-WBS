name: 🔄 Notion WBS 자동 동기화

on:
  schedule:
    # KST 기준 09:00, 13:00, 18:00, 22:00 (UTC -9h)
    - cron: '0 0,4,9,13 * * *'
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: write

jobs:
  sync-wbs:
    runs-on: ubuntu-latest
    name: Notion → data.json 동기화

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Notion WBS data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, json, requests, sys
          from datetime import datetime, timezone, timedelta

          TOKEN = os.environ.get("NOTION_TOKEN", "")
          DATABASE_ID = "559654aed9404d9f88225ea0adc7d746"
          KST = timezone(timedelta(hours=9))

          if not TOKEN:
              print("❌ NOTION_TOKEN secret이 설정되지 않았습니다.")
              sys.exit(1)

          headers = {
              "Authorization": f"Bearer {TOKEN}",
              "Notion-Version": "2022-06-28",
              "Content-Type": "application/json"
          }

          def get_text(prop):
              if not prop: return ""
              t = prop.get("type", "")
              if t == "title": return "".join(r.get("plain_text","") for r in prop.get("title",[]))
              if t == "rich_text": return "".join(r.get("plain_text","") for r in prop.get("rich_text",[]))
              if t == "select": return (prop.get("select") or {}).get("name","")
              if t == "number": v = prop.get("number"); return v if v is not None else None
              if t == "date":
                  d = prop.get("date")
                  return d.get("start","") if d else ""
              if t == "url": return prop.get("url","") or ""
              return ""

          records = []
          cursor = None
          page_count = 0

          print("🔄 Notion WBS 데이터 수집 시작...")

          while True:
              body = {"page_size": 100}
              if cursor:
                  body["start_cursor"] = cursor

              resp = requests.post(
                  f"https://api.notion.com/v1/databases/{DATABASE_ID}/query",
                  headers=headers,
                  json=body,
                  timeout=30
              )

              if resp.status_code != 200:
                  print(f"❌ Notion API 오류: {resp.status_code} - {resp.text}")
                  sys.exit(1)

              data = resp.json()
              results = data.get("results", [])
              page_count += len(results)

              for page in results:
                  p = page.get("properties", {})

                  # WBS 코드 추출 (Name 필드에서 [X.X.X] 패턴 파싱)
                  name_raw = get_text(p.get("Name", {}))
                  wbs_code = ""
                  wbs_name = name_raw
                  if name_raw and name_raw.startswith("["):
                      end = name_raw.find("]")
                      if end > 0:
                          wbs_code = name_raw[1:end].strip()
                          wbs_name = name_raw[end+1:].strip()

                  진행률 = get_text(p.get("진행률", {}))
                  계획공정률 = get_text(p.get("계획공정률", {}))
                  실적공정률 = get_text(p.get("실적공정률", {}))

                  # 진척차 계산 (실적 - 계획)
                  try:
                      gap = (float(실적공정률 or 0) - float(계획공정률 or 0)) if 실적공정률 and 계획공정률 else None
                  except:
                      gap = None

                  record = {
                      "id": page["id"],
                      "wbs_code": wbs_code,
                      "name": name_raw,
                      "wbs_name": wbs_name,
                      "level": get_text(p.get("Level", {})),
                      "대분류": get_text(p.get("대분류", {})),
                      "중분류": get_text(p.get("중분류", {})),
                      "작업명": get_text(p.get("작업명", {})),
                      "담당기관": get_text(p.get("담당기관", {})),
                      "담당R": get_text(p.get("담당R", {})),
                      "승인A": get_text(p.get("승인A", {})),
                      "협업C": get_text(p.get("협업C", {})),
                      "시작일": get_text(p.get("시작일", {})),
                      "종료일": get_text(p.get("종료일", {})),
                      "기간": get_text(p.get("기간", {})),
                      "진행률": 진행률,
                      "계획공정률": 계획공정률,
                      "실적공정률": 실적공정률,
                      "진척차": gap,
                      "예산": get_text(p.get("예산", {})),
                      "가중치": get_text(p.get("가중치", {})),
                      "산출물": get_text(p.get("산출물", {})),
                      "비고": get_text(p.get("비고", {})),
                      "선행작업": get_text(p.get("선행작업", {})),
                      "근거자료": get_text(p.get("근거자료", {})),
                      "notion_url": page.get("url", ""),
                      "last_edited": page.get("last_edited_time", "")
                  }
                  records.append(record)

              print(f"  수집 중... {page_count}건")

              if not data.get("has_more"):
                  break
              cursor = data.get("next_cursor")

          # WBS 코드 순서로 정렬
          def sort_key(r):
              code = r.get("wbs_code","") or r.get("name","")
              parts = code.replace(" ","").split(".")
              try:
                  return [int(p) if p.isdigit() else 9999 for p in parts] + [0]*(6-len(parts))
              except:
                  return [9999]

          records.sort(key=sort_key)

          # 통계 계산
          total = len(records)
          l1 = [r for r in records if r["level"] == "1"]
          l2 = [r for r in records if r["level"] == "2"]
          l3 = [r for r in records if r["level"] == "3"]

          # 담당기관별 통계
          agencies = {}
          for r in records:
              ag = r["담당기관"] or "미지정"
              if ag not in agencies:
                  agencies[ag] = {"count": 0, "avg_progress": 0, "items": []}
              agencies[ag]["count"] += 1
              agencies[ag]["items"].append(r)

          for ag, v in agencies.items():
              progs = [float(item["진행률"]) for item in v["items"] if item["진행률"] not in (None, "", "None")]
              agencies[ag]["avg_progress"] = round(sum(progs)/len(progs)*100, 1) if progs else 0

          # 대분류별 통계
          categories = {}
          for r in records:
              cat = r["대분류"] or "미분류"
              if len(cat) > 20: cat = cat[:20] + "..."  # 너무 긴 항목 축약
              if cat not in categories:
                  categories[cat] = {"count": 0, "avg_progress": 0, "items": []}
              categories[cat]["count"] += 1
              categories[cat]["items"].append(r)

          for cat, v in categories.items():
              progs = [float(item["진행률"]) for item in v["items"] if item["진행률"] not in (None, "", "None")]
              categories[cat]["avg_progress"] = round(sum(progs)/len(progs)*100, 1) if progs else 0
              del categories[cat]["items"]

          # 전체 진행률 (레벨 1 기준 가중 평균 우선, 없으면 단순 평균)
          overall_progress = 0
          if l1:
              progs = [float(r["진행률"])*100 for r in l1 if r["진행률"] not in (None,"","None")]
              overall_progress = round(sum(progs)/len(progs), 1) if progs else 0
          else:
              progs = [float(r["진행률"])*100 for r in records if r["진행률"] not in (None,"","None")]
              overall_progress = round(sum(progs)/len(progs), 1) if progs else 0

          # 지연 항목 추출 (진척차가 음수)
          delayed = [r for r in records if r["진척차"] is not None and r["진척차"] < -0.05]

          now_kst = datetime.now(KST).strftime("%Y-%m-%d %H:%M KST")

          output = {
              "updated_at": now_kst,
              "updated_at_iso": datetime.now(KST).isoformat(),
              "total": total,
              "summary": {
                  "overall_progress": overall_progress,
                  "level1_count": len(l1),
                  "level2_count": len(l2),
                  "level3_count": len(l3),
                  "delayed_count": len(delayed),
                  "agencies": {k: {"count": v["count"], "avg_progress": v["avg_progress"]} for k, v in agencies.items()},
                  "categories": categories
              },
              "records": records
          }

          os.makedirs("data", exist_ok=True)
          with open("data/wbs.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"\n✅ data/wbs.json 저장 완료")
          print(f"   총 {total}건 | 전체 진행률 {overall_progress}% | 지연 {len(delayed)}건")
          EOF

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wbs.json
          if git diff --staged --quiet; then
            echo "변경사항 없음 - 커밋 생략"
          else
            TIMESTAMP=$(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')
            git commit -m "🔄 WBS 자동 동기화: ${TIMESTAMP}"
            git push
            echo "✅ data/wbs.json 업로드 완료"
          fi
