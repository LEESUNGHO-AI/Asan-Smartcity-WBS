name: 📊 Notion WBS → GitHub Pages 동기화

on:
  schedule:
    # 매일 00:30 KST (15:30 UTC) 자동 실행
    - cron: '30 15 * * *'
  workflow_dispatch:
    # 수동 실행 가능
    inputs:
      reason:
        description: '실행 사유'
        required: false
        default: '수동 동기화'

permissions:
  contents: write

jobs:
  sync:
    name: Notion → JSON → GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 🔧 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 의존성 설치
        run: npm install @notionhq/client

      - name: 📊 Notion DB 데이터 추출
        env:
          NOTION_TOKEN: ${{ secrets.ASAN }}
          NOTION_DB_ID: '559654aed9404d9f88225ea0adc7d746'
        run: node fetch-notion.js

      - name: 📝 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet data/wbs.json 2>/dev/null; then
            echo "✅ 변경사항 없음"
          else
            git add data/wbs.json
            git commit -m "📊 WBS 데이터 자동 업데이트 [$(date '+%Y-%m-%d %H:%M KST' -d '+9 hours')]"
            git push
            echo "✅ 데이터 업데이트 완료"
          fi

