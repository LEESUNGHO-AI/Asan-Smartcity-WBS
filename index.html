<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아산 스마트시티 WBS 대시보드 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Variables ───────────────────────────────── */
:root{
  --bg0:#0d1117;--bg1:#161b22;--bg2:#1c2128;--bg3:#21262d;
  --bdr:#30363d;--bdrs:#21262d;
  --t1:#e6edf3;--t2:#8b949e;--t3:#656d76;
  --acc:#388bfd;--grn:#3fb950;--ylw:#d29922;--red:#f85149;
  --pur:#bc8cff;--org:#ffa657;--cyn:#39d353;--sky:#79c0ff;
  --fm:'Noto Sans KR',sans-serif;--fmono:'JetBrains Mono',monospace;
  --r:8px;--rl:12px;--sh:0 2px 8px rgba(0,0,0,.35);--tr:.16s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fm);background:var(--bg0);color:var(--t1);font-size:14px;line-height:1.6;min-height:100vh}
input,select,button{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

/* ─── Header ────────────────────────────────────────── */
.hdr{background:linear-gradient(135deg,var(--bg1),var(--bg2));border-bottom:1px solid var(--bdr);padding:14px 24px;position:sticky;top:0;z-index:100}
.hdr-in{max-width:1480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:11px}
.logo-ic{width:34px;height:34px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo h1{font-size:15px;font-weight:700;line-height:1.2}
.logo p{font-size:11px;color:var(--t3);margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-blue{background:rgba(56,139,253,.16);color:var(--acc);border:1px solid rgba(56,139,253,.28)}
.b-grn{background:rgba(63,185,80,.13);color:var(--grn);border:1px solid rgba(63,185,80,.22)}
.b-gray{background:rgba(139,148,158,.1);color:var(--t2);border:1px solid var(--bdr)}
.sync-t{font-size:11px;color:var(--t3);font-family:var(--fmono)}
.btn-rf{background:rgba(56,139,253,.1);border:1px solid rgba(56,139,253,.28);color:var(--acc);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px;transition:var(--tr)}
.btn-rf:hover{background:rgba(56,139,253,.22)}
.btn-rf.spin{animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ─── Nav ───────────────────────────────────────────── */
.nav{background:var(--bg1);border-bottom:1px solid var(--bdr);padding:0 24px;position:sticky;top:65px;z-index:99}
.nav-in{max-width:1480px;margin:0 auto;display:flex;gap:2px}
.ntab{padding:11px 18px;border:none;background:none;color:var(--t3);cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid transparent;transition:var(--tr);white-space:nowrap}
.ntab:hover{color:var(--t1)}
.ntab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ─── Layout ────────────────────────────────────────── */
.main{max-width:1480px;margin:0 auto;padding:20px 24px;min-height:calc(100vh - 128px)}
.tp{display:none}.tp.on{display:block}

/* ─── Loading / Error ───────────────────────────────── */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:70px 20px;color:var(--t3)}
.sp{width:26px;height:26px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
.err{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.28);border-radius:var(--r);padding:14px;color:var(--red);font-size:13px}

/* ─── Card ──────────────────────────────────────────── */
.card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--rl);padding:18px;box-shadow:var(--sh)}
.ct{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
@media(max-width:1050px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){.g4,.g3,.g2{grid-template-columns:1fr}}

/* ─── KPI ───────────────────────────────────────────── */
.kpi{background:var(--bg2);border:1px solid var(--bdrs);border-radius:var(--r);padding:15px;transition:var(--tr)}
.kpi:hover{border-color:var(--acc);transform:translateY(-1px)}
.kl{font-size:11px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kv{font-size:24px;font-weight:700;font-family:var(--fmono);line-height:1}
.ks{font-size:11px;color:var(--t3);margin-top:4px}
.c-a{color:var(--acc)}.c-g{color:var(--grn)}.c-r{color:var(--red)}.c-y{color:var(--ylw)}.c-p{color:var(--pur)}.c-o{color:var(--org)}

/* ─── Progress Bar ──────────────────────────────────── */
.pb{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:5px 0}
.pb-i{height:100%;border-radius:3px;transition:width .5s ease}
.pb-p{background:rgba(56,139,253,.32)}.pb-a{background:var(--grn)}

/* ─── Status Badge ──────────────────────────────────── */
.sb{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:500}
.sb::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.s완료{background:rgba(63,185,80,.14);color:var(--grn)}.s완료::before{background:var(--grn)}
.s진행중{background:rgba(56,139,253,.14);color:var(--acc)}.s진행중::before{background:var(--acc)}
.s지연{background:rgba(248,81,73,.14);color:var(--red)}.s지연::before{background:var(--red)}
.s대기{background:rgba(139,148,158,.1);color:var(--t3)}.s대기::before{background:var(--t3)}

/* ─── Table ─────────────────────────────────────────── */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--bg2);padding:9px 11px;text-align:left;color:var(--t3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bdr);white-space:nowrap}
th[data-s]{cursor:pointer}th[data-s]:hover{color:var(--t1)}
th.sa::after{content:' ↑';color:var(--acc)}th.sd::after{content:' ↓';color:var(--acc)}
tbody tr{border-bottom:1px solid var(--bdrs);transition:var(--tr)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(56,139,253,.04)}
tbody td{padding:8px 11px;vertical-align:middle}
.ti{font-family:var(--fmono);color:var(--acc);font-size:11px;white-space:nowrap}
.tn{max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tnr{font-family:var(--fmono);text-align:right;white-space:nowrap}
.lv1{color:var(--pur);font-weight:700}.lv2{color:var(--cyn);font-weight:600}.lv3{color:var(--t2)}

/* ─── Filter Bar ─────────────────────────────────────── */
.fb{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;flex-wrap:wrap;gap:7px}
.fb input,.fb select{background:var(--bg2);border:1px solid var(--bdr);color:var(--t1);border-radius:6px;padding:5px 9px;font-size:12px;transition:var(--tr)}
.fb input:focus,.fb select:focus{outline:none;border-color:var(--acc)}
.fl{font-size:11px;color:var(--t3);font-weight:500}
.fs{flex:1;min-width:8px}
.rc{font-size:11px;color:var(--t3);font-family:var(--fmono);white-space:nowrap}

/* ─── Summary Hero ───────────────────────────────────── */
.sh-wrap{background:linear-gradient(135deg,rgba(56,139,253,.09),rgba(56,139,253,.03));border:1px solid rgba(56,139,253,.17);border-radius:var(--rl);padding:22px;margin-bottom:18px}
.sh-title{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.sh-grid{display:grid;grid-template-columns:120px repeat(4,1fr);gap:14px;align-items:center}
@media(max-width:850px){.sh-grid{grid-template-columns:repeat(3,1fr)}}
.sh-s{text-align:center}
.sh-v{font-size:28px;font-weight:700;font-family:var(--fmono);line-height:1}
.sh-l{font-size:11px;color:var(--t3);margin-top:5px}
.sh-sub{font-size:10px;color:var(--t3)}

/* ─── Category Table ─────────────────────────────────── */
.cr{display:grid;grid-template-columns:155px 1fr 60px 60px 60px 48px 48px 48px 48px;align-items:center;gap:7px;padding:10px 13px;border-bottom:1px solid var(--bdrs);transition:var(--tr)}
.cr:last-child{border-bottom:none}
.cr:hover{background:rgba(255,255,255,.02)}
.cr-hd{background:var(--bg2);font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;border-radius:var(--r) var(--r) 0 0}
.cr-tt{background:linear-gradient(90deg,rgba(56,139,253,.07),transparent);border-top:1px solid var(--bdr);font-weight:600}
.cn{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbw{position:relative;height:16px;background:var(--bg3);border-radius:3px;overflow:hidden}
.cbp{position:absolute;inset:0;background:rgba(56,139,253,.26);border-radius:3px}
.cba{position:absolute;inset:0;background:var(--grn);opacity:.78;border-radius:3px}
.cp{font-size:11px;font-family:var(--fmono);text-align:right}
.cc{font-size:11px;font-family:var(--fmono);text-align:center}
@media(max-width:1000px){.cr{grid-template-columns:130px 1fr 52px 52px 52px 40px 40px 40px 40px}}

/* ─── Gantt ──────────────────────────────────────────── */
.gw{overflow:auto;max-height:calc(100vh - 240px);border:1px solid var(--bdr);border-radius:var(--r)}
.gt{border-collapse:collapse;white-space:nowrap}
.gt th{background:var(--bg2);padding:7px 5px;font-size:10px;color:var(--t3);border:1px solid var(--bdrs);text-align:center;position:sticky;top:0;z-index:10}
.gt .th-f{position:sticky;left:0;z-index:11;min-width:210px;max-width:210px;text-align:left;padding-left:8px;background:var(--bg2)}
.gt td{border:1px solid var(--bdrs);padding:0;height:29px;vertical-align:middle}
.gt .td-f{position:sticky;left:0;background:var(--bg1);z-index:5;padding:0 8px;font-size:11px;border-right:2px solid var(--bdr);min-width:210px;max-width:210px;overflow:hidden;white-space:nowrap}
.gb{position:absolute;top:4px;height:21px;border-radius:3px;overflow:hidden}
.gbp{background:rgba(56,139,253,.27);border:1px solid rgba(56,139,253,.37)}
.gba{background:rgba(63,185,80,.42);border:1px solid rgba(63,185,80,.55)}
.gbd{background:rgba(248,81,73,.35);border:1px solid rgba(248,81,73,.5)}
.g-td{position:absolute;top:0;width:2px;background:var(--red);opacity:.65;z-index:3;pointer-events:none}

/* ─── Org Cards ──────────────────────────────────────── */
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:13px;margin-bottom:18px}
.oc{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--rl);padding:17px;transition:var(--tr)}
.oc:hover{border-color:var(--acc)}
.on{font-size:15px;font-weight:700;margin-bottom:3px}
.os{font-size:11px;color:var(--t3);margin-bottom:13px}
.or{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.ol{font-size:11px;color:var(--t3)}
.ov{font-size:13px;font-weight:600;font-family:var(--fmono)}

/* ─── Pagination ─────────────────────────────────────── */
.pg{display:flex;align-items:center;gap:4px;justify-content:center;margin-top:13px}
.pgb{width:27px;height:27px;border-radius:6px;border:1px solid var(--bdr);background:var(--bg2);color:var(--t2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.pgb:hover,.pgb.on{background:var(--acc);border-color:var(--acc);color:#fff}
.pgb:disabled{opacity:.35;cursor:not-allowed}

/* ─── Source info ────────────────────────────────────── */
.src-info{font-size:11px;color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:5px}
.src-dot{width:6px;height:6px;background:var(--grn);border-radius:50%;display:inline-block;flex-shrink:0}
.src-dot-o{background:var(--org)}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <div class="logo-ic">🏗️</div>
      <div>
        <h1>아산시 강소형 스마트시티 WBS 대시보드</h1>
        <p>아산시 · 제일엔지니어링 · 호서대 · 충남연구원 · KAIST &nbsp;|&nbsp; 2023.12 ~ 2026.12</p>
      </div>
    </div>
    <div class="hdr-r">
      <span class="badge b-blue">총예산 240억원</span>
      <span class="badge b-grn" id="hdr-st">로딩 중...</span>
      <span class="sync-t" id="hdr-sync">--</span>
      <button class="btn-rf" id="btn-rf" onclick="refresh()">↻ 새로고침</button>
    </div>
  </div>
</header>

<!-- ═══ NAV ═══ -->
<nav class="nav">
  <div class="nav-in">
    <button class="ntab on" onclick="go('s')">📊 종합현황</button>
    <button class="ntab"    onclick="go('w')">📋 전체 WBS</button>
    <button class="ntab"    onclick="go('g')">📅 간트 차트</button>
    <button class="ntab"    onclick="go('o')">🏢 기관별</button>
  </div>
</nav>

<!-- ═══ MAIN ═══ -->
<main class="main">
  <div id="tp-s" class="tp on"><div class="ld"><div class="sp"></div><span>총괄표 로딩 중...</span></div></div>
  <div id="tp-w" class="tp"><div class="ld"><div class="sp"></div><span>WBS 로딩 중...</span></div></div>
  <div id="tp-g" class="tp"><div class="ld"><div class="sp"></div><span>간트 로딩 중...</span></div></div>
  <div id="tp-o" class="tp"><div class="ld"><div class="sp"></div><span>기관별 로딩 중...</span></div></div>
</main>

<script>
/* ══════════════════════════════════════════════════════
   State
══════════════════════════════════════════════════════ */
let WD=null,SD=null,cur='s';
let wf={q:'',lv:'',cat:'',st:'',ps:50},wp=1,wc=null,wd='asc';
let glv='12',gcat='';

/* ══════════════════════════════════════════════════════
   Data Fetch
   wbs-data.json    → WBS 2026 DB  (전체WBS, 간트, 기관별)
   summary-data.json→ 총괄표 DB    (종합현황)
══════════════════════════════════════════════════════ */
const bust=()=>'?t='+Math.floor(Date.now()/60000);

async function fj(url){
  const r=await fetch(url+bust());
  if(!r.ok) throw new Error('HTTP '+r.status+' '+url);
  return r.json();
}

async function loadAll(){
  const btn=document.getElementById('btn-rf');
  btn.classList.add('spin');
  try{
    const [wRes,sRes]=await Promise.allSettled([
      fj('data/wbs-data.json'),
      fj('data/summary-data.json')
    ]);
    WD = wRes.status==='fulfilled' ? wRes.value : null;
    SD = sRes.status==='fulfilled' ? sRes.value : null;
    if(!WD) throw new Error('wbs-data.json 로드 실패');

    const sm=WD.summary||{};
    document.getElementById('hdr-st').textContent=`${sm.total||0}건 / 완료 ${sm.done||0}건`;
    document.getElementById('hdr-st').className='badge b-grn';
    document.getElementById('hdr-sync').textContent='동기화: '+(WD.meta?.generatedAtKst||'--');
    render();
  }catch(e){
    console.error(e);
    document.getElementById('hdr-st').textContent='오류';
    document.getElementById('hdr-st').className='badge b-gray';
    ['s','w','g','o'].forEach(t=>eltp(t).innerHTML='<div class="err">⚠️ '+e.message+'</div>');
  }finally{btn.classList.remove('spin')}
}

function refresh(){loadAll()}
const eltp=id=>document.getElementById('tp-'+id);

/* ══════════════════════════════════════════════════════
   Tab
══════════════════════════════════════════════════════ */
function go(name){
  cur=name;
  document.querySelectorAll('.ntab').forEach((t,i)=>t.classList.toggle('on',['s','w','g','o'][i]===name));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('on'));
  eltp(name).classList.add('on');
  if(WD) render();
}
function render(){
  if(cur==='s') rSum();
  else if(cur==='w') rWBS();
  else if(cur==='g') rGantt();
  else if(cur==='o') rOrg();
}

/* ══════════════════════════════════════════════════════
   Utilities
══════════════════════════════════════════════════════ */
const pct=v=>`${(+(v||0)).toFixed(1)}%`;
const n2=v=>(+(v||0)).toLocaleString();
const fd=s=>s?s.replace(/-/g,'.'):'–';
const stb=s=>`<span class="sb s${s}">${s}</span>`;
function lvc(lv){return lv==='1'?'lv1':lv==='2'?'lv2':'lv3'}
function valid(){return(WD?.items||[]).filter(i=>i.wbsId&&i.level)}

function pb2(plan,act,h=7){
  const p=Math.min(+plan||0,100),a=Math.min(+act||0,100);
  return `<div style="position:relative;height:${h}px;background:var(--bg3);border-radius:3px;overflow:hidden">
    <div style="position:absolute;inset:0;width:${p}%;background:rgba(56,139,253,.3);border-radius:3px"></div>
    <div style="position:absolute;inset:0;width:${a}%;background:var(--grn);opacity:.82;border-radius:3px"></div>
  </div>`;
}

function nSort(a,b){
  const pa=(a||'').split('.').map(x=>+x||x);
  const pb=(b||'').split('.').map(x=>+x||x);
  for(let i=0;i<Math.max(pa.length,pb.length);i++){
    const va=pa[i]??0,vb=pb[i]??0;
    if(va<vb)return -1;if(va>vb)return 1;
  }return 0;
}

function donut(plan,actual,sz=108){
  const r=44,c=2*Math.PI*r;
  const dp=(Math.min(+plan||0,100)/100*c).toFixed(2);
  const da=(Math.min(+actual||0,100)/100*c).toFixed(2);
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="transform:rotate(-90deg)">
    <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="9"/>
    <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="rgba(56,139,253,.32)" stroke-width="9" stroke-dasharray="${dp} ${c}" stroke-linecap="round"/>
    <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--grn)" stroke-width="9" stroke-dasharray="${da} ${c}" stroke-linecap="round"/>
  </svg>`;
}

const CAT_CLR={
  '사업총괄':'#bc8cff','프로젝트 관리/거버넌스':'#388bfd',
  '실시설계':'#ffa657','나라장터 발주 지원':'#d29922',
  '서비스 구축':'#3fb950','통합시험/시범운영':'#39d353',
  '준공/검수/이관':'#f85149','운영(3년)':'#79c0ff','마일스톤':'#8b949e'
};
const ORG_META={
  '제일엔지니어링':{role:'직접보조사업자 / 사업총괄',clr:'#388bfd'},
  '아산시'        :{role:'시행기관 / 지방자치단체',  clr:'#3fb950'},
  '호서대'        :{role:'간접보조사업자 / 연구개발',clr:'#bc8cff'},
  '충남연구원'    :{role:'간접보조사업자 / 정책연구',clr:'#ffa657'},
  'KAIST'         :{role:'간접보조사업자 / 기술연구', clr:'#f85149'}
};

/* ══════════════════════════════════════════════════════
   [탭2] 전체 WBS  ← wbs-data.json (WBS 2026 DB)
══════════════════════════════════════════════════════ */
function applyF(){
  let it=valid();
  if(wf.q){const q=wf.q.toLowerCase();it=it.filter(i=>i.wbsId.toLowerCase().includes(q)||(i.name||'').toLowerCase().includes(q))}
  if(wf.lv) it=it.filter(i=>i.level===wf.lv);
  if(wf.cat)it=it.filter(i=>i.category===wf.cat);
  if(wf.st) it=it.filter(i=>i.status===wf.st);
  if(wc) it.sort((a,b)=>{let va=a[wc]??'',vb=b[wc]??'';return typeof va==='number'?(wd==='asc'?va-vb:vb-va):(wd==='asc'?String(va).localeCompare(String(vb),'ko'):String(vb).localeCompare(String(va),'ko'))});
  else it.sort((a,b)=>nSort(a.wbsId,b.wbsId));
  return it;
}

function rWBS(){
  const all=valid();
  const cats=[...new Set(all.map(i=>i.category).filter(Boolean))].sort();
  const src=WD?.meta?.source||'--';
  const kst=WD?.meta?.generatedAtKst||'--';

  eltp('w').innerHTML=`
<div class="src-info"><span class="src-dot"></span>출처: ${src} &nbsp;·&nbsp; ${kst}</div>
<div class="fb">
  <span class="fl">검색</span>
  <input type="text" placeholder="WBS ID / 작업명..." style="width:170px" value="${wf.q}"
    oninput="wf.q=this.value;wp=1;rwt()">
  <span class="fl">Level</span>
  <select onchange="wf.lv=this.value;wp=1;rwt()">
    <option value="">전체</option>
    ${['1','2','3'].map(l=>`<option value="${l}" ${wf.lv===l?'selected':''}>Level ${l}</option>`).join('')}
  </select>
  <span class="fl">대분류</span>
  <select onchange="wf.cat=this.value;wp=1;rwt()">
    <option value="">전체</option>
    ${cats.map(c=>`<option value="${c}" ${wf.cat===c?'selected':''}>${c}</option>`).join('')}
  </select>
  <span class="fl">상태</span>
  <select onchange="wf.st=this.value;wp=1;rwt()">
    <option value="">전체</option>
    ${['완료','진행중','지연','대기'].map(s=>`<option ${wf.st===s?'selected':''}>${s}</option>`).join('')}
  </select>
  <span class="fl">표시</span>
  <select onchange="wf.ps=+this.value;wp=1;rwt()">
    ${[30,50,100,200].map(n=>`<option value="${n}" ${wf.ps===n?'selected':''}>${n}개</option>`).join('')}
  </select>
  <span class="fs"></span>
  <span class="rc" id="wrc">--</span>
</div>
<div id="wta"></div>`;
  rwt();
}

function rwt(){
  const it=applyF(),tot=it.length,ps=wf.ps;
  const pgs=Math.max(1,Math.ceil(tot/ps));
  if(wp>pgs) wp=pgs;
  const sl=it.slice((wp-1)*ps,wp*ps);
  const rc=document.getElementById('wrc');
  if(rc) rc.textContent=`${tot.toLocaleString()}건 / ${valid().length}건`;

  const sh=col=>{
    const cl=wc===col?(wd==='asc'?' sa':' sd'):'';
    return `<th data-s="${col}" class="${cl.trim()}" onclick="srt('${col}')">`;
  };

  let html=`<div class="tw"><table><thead><tr>
    ${sh('wbsId')}WBS ID</th>
    <th>Lv</th>
    ${sh('name')}작업명</th>
    ${sh('category')}대분류</th>
    <th>담당기관</th>
    ${sh('startDate')}시작일</th>
    ${sh('endDate')}종료일</th>
    <th style="min-width:130px">실적/계획</th>
    ${sh('deviation')}진척차</th>
    <th>담당자</th>
    ${sh('status')}상태</th>
  </tr></thead><tbody>`;

  sl.forEach(i=>{
    const dv=+(i.deviation||0);
    const dvs=dv<-5?'color:var(--red)':dv>5?'color:var(--grn)':'color:var(--t2)';
    html+=`<tr>
      <td class="ti">${i.wbsId}</td>
      <td><span class="${lvc(i.level)}" style="font-size:11px">L${i.level}</span></td>
      <td class="tn" title="${i.name||''}">${i.name||'–'}</td>
      <td style="font-size:11px;color:var(--t2);white-space:nowrap">${i.category||'–'}</td>
      <td style="font-size:11px;color:var(--t3);white-space:nowrap">${i.organization||'–'}</td>
      <td class="tnr" style="font-size:11px">${fd(i.startDate)}</td>
      <td class="tnr" style="font-size:11px">${fd(i.endDate)}</td>
      <td>${pb2(i.plannedRate,i.actualRate,6)}
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-top:1px">
          <span>실 ${pct(i.actualRate)}</span><span>계 ${pct(i.plannedRate)}</span>
        </div>
      </td>
      <td class="tnr" style="${dvs};font-size:11px">${dv>=0?'+':''}${pct(dv)}</td>
      <td style="font-size:11px;color:var(--t3)">${i.manager||'–'}</td>
      <td>${stb(i.status)}</td>
    </tr>`;
  });
  html+='</tbody></table></div>';

  if(pgs>1){
    html+='<div class="pg">';
    html+=`<button class="pgb" ${wp===1?'disabled':''} onclick="wp=1;rwt()">«</button>`;
    html+=`<button class="pgb" ${wp===1?'disabled':''} onclick="wp--;rwt()">‹</button>`;
    for(let p=Math.max(1,wp-2);p<=Math.min(pgs,Math.max(1,wp-2)+4);p++)
      html+=`<button class="pgb ${p===wp?'on':''}" onclick="wp=${p};rwt()">${p}</button>`;
    html+=`<button class="pgb" ${wp===pgs?'disabled':''} onclick="wp++;rwt()">›</button>`;
    html+=`<button class="pgb" ${wp===pgs?'disabled':''} onclick="wp=${pgs};rwt()">»</button>`;
    html+=`<span style="font-size:11px;color:var(--t3);margin-left:4px">${wp}/${pgs}</span>`;
    html+='</div>';
  }
  document.getElementById('wta').innerHTML=html;
}

function srt(col){
  wc===col ? wd=(wd==='asc'?'desc':'asc') : (wc=col,wd='asc');
  wp=1; rwt();
}

/* ══════════════════════════════════════════════════════
   [탭3] 간트 차트  ← wbs-data.json (WBS 2026 DB)
══════════════════════════════════════════════════════ */
function rGantt(){
  const all=valid().filter(i=>i.startDate&&i.endDate);
  const cats=[...new Set(all.map(i=>i.category).filter(Boolean))].sort();

  let items=[...all];
  if(glv==='12') items=items.filter(i=>i.level==='1'||i.level==='2');
  else if(glv==='1') items=items.filter(i=>i.level==='1');
  else if(glv==='2') items=items.filter(i=>i.level==='2');
  if(gcat) items=items.filter(i=>i.category===gcat);
  items.sort((a,b)=>nSort(a.wbsId,b.wbsId));

  // 날짜 범위
  let mn=new Date('2023-12-01'),mx=new Date('2026-12-31');
  all.forEach(i=>{
    const s=new Date(i.startDate),e=new Date(i.endDate);
    if(s<mn)mn=s; if(e>mx)mx=e;
  });
  const months=[];
  for(let d=new Date(mn.getFullYear(),mn.getMonth(),1);d<=mx;d.setMonth(d.getMonth()+1))
    months.push(new Date(d));

  const today=new Date(),CW=68,FW=212;
  const todayX=getTodayX(today,months,CW,FW);
  const kst=WD?.meta?.generatedAtKst||'--';

  eltp('g').innerHTML=`
<div class="src-info"><span class="src-dot"></span>출처: Notion WBS 2026 DB &nbsp;·&nbsp; ${kst}</div>
<div class="fb" style="margin-bottom:12px">
  <span class="fl">Level</span>
  <select onchange="glv=this.value;rGantt()">
    <option value="12" ${glv==='12'?'selected':''}>Level 1+2</option>
    <option value="1"  ${glv==='1'?'selected':''}>Level 1만</option>
    <option value="2"  ${glv==='2'?'selected':''}>Level 2만</option>
    <option value="all"${glv==='all'?'selected':''}>전체(1+2+3)</option>
  </select>
  <span class="fl">대분류</span>
  <select onchange="gcat=this.value;rGantt()">
    <option value="">전체</option>
    ${cats.map(c=>`<option value="${c}" ${gcat===c?'selected':''}>${c}</option>`).join('')}
  </select>
  <span class="fs"></span>
  <div style="display:flex;align-items:center;gap:11px;font-size:11px;color:var(--t2)">
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:rgba(56,139,253,.28);border-radius:2px;display:inline-block"></span>계획</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:rgba(63,185,80,.45);border-radius:2px;display:inline-block"></span>실적</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:rgba(248,81,73,.38);border-radius:2px;display:inline-block"></span>지연</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:2px;height:13px;background:var(--red);display:inline-block"></span>오늘</span>
  </div>
</div>
<div class="gw">
  <div style="position:relative;display:inline-block;min-width:100%">
    ${todayX!=null?`<div class="g-td" style="left:${todayX}px;height:${(items.length+2)*30}px"></div>`:''}
    <table class="gt" style="table-layout:fixed">
      <thead><tr>
        <th class="th-f" style="width:${FW}px">작업명</th>
        ${months.map(m=>`<th style="width:${CW}px">${m.getFullYear()}.${String(m.getMonth()+1).padStart(2,'0')}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${items.map(item=>mkGRow(item,months,CW,FW)).join('')}
      </tbody>
    </table>
  </div>
</div>
<div style="margin-top:8px;font-size:11px;color:var(--t3);text-align:center">
  표시: ${items.length}건 &nbsp;·&nbsp; 기간: ${months[0]?.getFullYear()}.${months[0]?.getMonth()+1} ~ ${months[months.length-1]?.getFullYear()}.${months[months.length-1]?.getMonth()+1}
</div>`;
}

function getTodayX(today,months,CW,FW){
  for(let m=0;m<months.length;m++){
    const ms=months[m],me=new Date(ms.getFullYear(),ms.getMonth()+1,0);
    if(today>=ms&&today<=me) return FW+m*CW+(today.getDate()/me.getDate())*CW;
  }return null;
}

function mkGRow(item,months,CW,FW){
  const bg=item.level==='1'?'background:rgba(188,140,255,.04)':
           item.level==='2'?'background:rgba(56,139,253,.03)':'';
  let cells='';
  months.forEach(m=>{
    const ms=new Date(m.getFullYear(),m.getMonth(),1);
    const me=new Date(m.getFullYear(),m.getMonth()+1,0);
    const is=item.startDate?new Date(item.startDate):null;
    const ie=item.endDate  ?new Date(item.endDate)  :null;
    let inner='';
    if(is&&ie&&is<=me&&ie>=ms){
      const cs=is<ms?ms:is,ce=ie>me?me:ie;
      const days=me.getDate();
      const lp=(cs.getDate()-1)/days*100;
      const wp=((ce-cs)/864e5+1)/days*100;
      const lps=lp.toFixed(1)+'%';
      const wps=Math.min(wp,100-lp).toFixed(1)+'%';
      inner=`<div class="gb gbp" style="left:${lps};width:${wps}"></div>`;
      if(item.actualRate>0){
        const aw=(item.actualRate/100*parseFloat(wps)).toFixed(1)+'%';
        const acls=item.status==='지연'?'gbd':'gba';
        inner+=`<div class="gb ${acls}" style="left:${lps};width:${aw}"></div>`;
      }
    }
    cells+=`<td style="width:${CW}px;padding:0;position:relative">${inner}</td>`;
  });
  return `<tr style="${bg}">
    <td class="td-f">
      <span class="${lvc(item.level)}" style="font-size:10px;margin-right:3px">L${item.level}</span>
      <span title="${item.name||''}">${item.wbsId}&nbsp;${(item.name||'').substring(0,14)}</span>
    </td>${cells}</tr>`;
}

/* ══════════════════════════════════════════════════════
   [탭4] 기관별  ← wbs-data.json (WBS 2026 DB)
            +   summary-data.json byOrg 보강
══════════════════════════════════════════════════════ */
function rOrg(){
  const all=valid();
  const sm=WD.summary||{};
  const kst=WD?.meta?.generatedAtKst||'--';

  /* 기관 데이터 빌드 */
  let orgMap={};
  /* ① summary-data.json byOrg 우선 (총괄표 DB) */
  if(SD?.byOrg?.length>0){
    SD.byOrg.forEach(r=>{orgMap[r.name]=r});
  }
  /* ② wbs summary.byOrg 보강 */
  Object.entries(sm.byOrg||{}).forEach(([nm,v])=>{
    if(!orgMap[nm]) orgMap[nm]={
      name:nm,total:v.total,done:v.done,inProg:v.inProg,
      delayed:v.delayed,waiting:v.waiting||0,
      plannedRate:v.avgPlan,actualRate:v.avgActual
    };
  });
  /* ③ 5개 컨소시엄 기관 보장 */
  ['제일엔지니어링','아산시','호서대','충남연구원','KAIST'].forEach(o=>{
    if(!orgMap[o]){
      const oi=all.filter(i=>i.organization===o);
      orgMap[o]={name:o,total:oi.length,
        done:oi.filter(i=>i.status==='완료').length,
        inProg:oi.filter(i=>i.status==='진행중').length,
        delayed:oi.filter(i=>i.status==='지연').length,
        waiting:oi.filter(i=>i.status==='대기').length,
        plannedRate:oi.length?oi.reduce((s,i)=>s+i.plannedRate,0)/oi.length:0,
        actualRate: oi.length?oi.reduce((s,i)=>s+i.actualRate,0)/oi.length:0
      };
    }
  });

  const ORG_ORDER=['제일엔지니어링','아산시','호서대','충남연구원','KAIST'];
  const orgs=ORG_ORDER.concat(Object.keys(orgMap).filter(o=>!ORG_ORDER.includes(o)));

  const cards=orgs.map(nm=>{
    const v=orgMap[nm];if(!v)return '';
    const meta=ORG_META[nm]||{role:'참여기관',clr:'var(--t2)'};
    const achv=v.total>0?+(v.done/v.total*100).toFixed(1):0;
    const dv=+((v.actualRate||0)-(v.plannedRate||0)).toFixed(1);
    return `<div class="oc">
      <div class="on" style="color:${meta.clr}">${nm}</div>
      <div class="os">${meta.role}</div>
      <div style="margin-bottom:12px">
        ${pb2(v.plannedRate||0,v.actualRate||0,9)}
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-top:2px">
          <span>계획 ${pct(v.plannedRate||0)}</span>
          <span>실적 ${pct(v.actualRate||0)}</span>
        </div>
      </div>
      <div class="or"><span class="ol">전체 작업</span><span class="ov c-a">${v.total}건</span></div>
      <div class="or"><span class="ol">완 료</span><span class="ov c-g">${v.done}건 (${achv}%)</span></div>
      <div class="or"><span class="ol">진행중</span><span class="ov" style="color:var(--acc)">${v.inProg}건</span></div>
      <div class="or"><span class="ol">지 연</span><span class="ov ${(v.delayed||0)>0?'c-r':''}">${v.delayed||0}건</span></div>
      <div class="or"><span class="ol">진척차</span><span class="ov ${dv>=0?'c-g':'c-r'}">${dv>=0?'+':''}${pct(dv)}</span></div>
    </div>`;
  }).join('');

  eltp('o').innerHTML=`
<div class="src-info"><span class="src-dot"></span>출처: Notion WBS 2026 DB &nbsp;·&nbsp; ${kst}</div>
<div class="og">${cards}</div>
<div class="card">
  <div class="ct">🏢 기관별 WBS 항목</div>
  <div class="fb" style="margin-bottom:11px">
    <span class="fl">기관 선택</span>
    <select id="osel" onchange="roTable(this.value)">
      ${orgs.filter(o=>orgMap[o]&&orgMap[o].total>0).map(o=>`<option>${o}</option>`).join('')}
    </select>
    <span class="fs"></span>
    <span class="rc" id="otc"></span>
  </div>
  <div id="ota"></div>
</div>`;

  roTable(orgs.find(o=>orgMap[o]&&orgMap[o].total>0)||orgs[0]);
}

function roTable(orgNm){
  const it=valid().filter(i=>i.organization===orgNm).sort((a,b)=>nSort(a.wbsId,b.wbsId));
  const tc=document.getElementById('otc');
  if(tc) tc.textContent=`${it.length}건`;
  let html=`<div class="tw"><table><thead><tr>
    <th>WBS ID</th><th>Lv</th><th>작업명</th><th>대분류</th>
    <th>시작일</th><th>종료일</th><th style="min-width:120px">실적/계획</th><th>상태</th>
  </tr></thead><tbody>`;
  it.slice(0,120).forEach(i=>{
    html+=`<tr>
      <td class="ti">${i.wbsId}</td>
      <td><span class="${lvc(i.level)}" style="font-size:11px">L${i.level}</span></td>
      <td class="tn" title="${i.name||''}">${i.name||'–'}</td>
      <td style="font-size:11px;color:var(--t2)">${i.category||'–'}</td>
      <td class="tnr" style="font-size:11px">${fd(i.startDate)}</td>
      <td class="tnr" style="font-size:11px">${fd(i.endDate)}</td>
      <td>${pb2(i.plannedRate,i.actualRate,6)}
        <div style="font-size:9px;color:var(--t3);text-align:right;margin-top:1px">${pct(i.actualRate)} / ${pct(i.plannedRate)}</div>
      </td>
      <td>${stb(i.status)}</td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  if(it.length>120)
    html+=`<div style="font-size:11px;color:var(--t3);text-align:center;margin-top:8px">상위 120건 표시 (전체 ${it.length}건)</div>`;
  const ota=document.getElementById('ota');
  if(ota) ota.innerHTML=html;
}

/* ══════════════════════════════════════════════════════
   Init
══════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', loadAll);
// 30분마다 자동 갱신
setInterval(loadAll, 30*60*1000);
</script>
