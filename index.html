<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>아산 스마트시티 WBS 대시보드 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg0: #0a0f1a;
  --bg1: #0f172a;
  --bg2: #1e293b;
  --bg3: #334155;
  --border: #1e293b;
  --border2: #334155;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --blue: #38bdf8;
  --blue2: #0ea5e9;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
  --purple: #a78bfa;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { background: var(--bg0); color: var(--text); font-family: var(--sans); min-height: 100vh; }

/* ── 헤더 ───────────────────────────── */
.header {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  border-bottom: 1px solid var(--border2);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.5);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-badge {
  background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
  border-radius: 6px; padding: 6px 10px;
  font-size: 11px; font-weight: 700; color: #fff; letter-spacing: .5px;
  white-space: nowrap;
}
.header-title { font-size: 16px; font-weight: 700; color: var(--text); }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.sync-info { font-size: 11px; color: var(--text3); text-align: right; }
.sync-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 4px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.btn-refresh {
  background: var(--bg2); border: 1px solid var(--border2); color: var(--text2);
  padding: 6px 12px; border-radius: var(--radius); cursor: pointer; font-size: 12px;
  font-family: var(--sans); transition: all .2s;
}
.btn-refresh:hover { background: var(--bg3); color: var(--text); }

/* ── KPI 카드 ───────────────────────── */
.kpi-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; padding: 20px 24px 0;
}
.kpi-card {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
  position: relative; overflow: hidden;
  transition: border-color .2s, transform .15s;
}
.kpi-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.kpi-card.blue::before { background: linear-gradient(90deg, var(--blue), var(--blue2)); }
.kpi-card.green::before { background: linear-gradient(90deg, #22c55e, #4ade80); }
.kpi-card.red::before { background: linear-gradient(90deg, #ef4444, #f87171); }
.kpi-card.yellow::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.kpi-card.purple::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
.kpi-card.orange::before { background: linear-gradient(90deg, #ea580c, #fb923c); }
.kpi-label { font-size: 11px; color: var(--text3); font-weight: 500; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 700; font-family: var(--mono); line-height: 1; }
.kpi-value.blue { color: var(--blue); }
.kpi-value.green { color: var(--green); }
.kpi-value.red { color: var(--red); }
.kpi-value.yellow { color: var(--yellow); }
.kpi-value.purple { color: var(--purple); }
.kpi-value.orange { color: var(--orange); }
.kpi-sub { font-size: 11px; color: var(--text3); margin-top: 6px; }
.kpi-bar { height: 3px; border-radius: 2px; background: var(--bg3); margin-top: 8px; overflow: hidden; }
.kpi-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }

/* ── 탭 ─────────────────────────────── */
.tab-bar {
  display: flex; gap: 4px; padding: 16px 24px 0;
  border-bottom: 1px solid var(--border); margin: 0 0 0;
}
.tab-btn {
  background: none; border: none; color: var(--text3);
  padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 500;
  font-family: var(--sans); border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: all .15s;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
.tab-pane { display: none; padding: 20px 24px; }
.tab-pane.active { display: block; }

/* ── 차트 그리드 ────────────────────── */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 16px; }
.chart-card {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
}
.chart-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 14px; letter-spacing: .3px; }
.chart-wrap { position: relative; height: 220px; }
.chart-wrap.tall { height: 280px; }

/* ── 필터 바 ────────────────────────── */
.filter-bar {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 16px;
}
.filter-bar label { font-size: 11px; color: var(--text3); font-weight: 600; }
.filter-select {
  background: var(--bg2); border: 1px solid var(--border2); color: var(--text2);
  padding: 5px 10px; border-radius: 6px; font-size: 12px;
  font-family: var(--sans); cursor: pointer; outline: none;
  transition: border-color .15s;
}
.filter-select:focus { border-color: var(--blue); }
.filter-input {
  background: var(--bg2); border: 1px solid var(--border2); color: var(--text);
  padding: 5px 10px; border-radius: 6px; font-size: 12px;
  font-family: var(--sans); outline: none; min-width: 200px;
  transition: border-color .15s;
}
.filter-input:focus { border-color: var(--blue); }
.filter-sep { width: 1px; height: 20px; background: var(--border2); }
.filter-count { font-size: 11px; color: var(--text3); margin-left: auto; }

/* ── 테이블 ─────────────────────────── */
.table-wrap { overflow: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  background: var(--bg2); padding: 10px 12px;
  text-align: left; font-weight: 600; color: var(--text3);
  border-bottom: 1px solid var(--border2);
  white-space: nowrap; user-select: none; cursor: pointer;
  font-size: 11px; letter-spacing: .3px;
}
thead th:hover { color: var(--text); }
thead th.sort-asc::after { content: ' ↑'; color: var(--blue); }
thead th.sort-desc::after { content: ' ↓'; color: var(--blue); }
tbody tr {
  border-bottom: 1px solid rgba(30,41,59,.8);
  transition: background .1s;
}
tbody tr:hover { background: rgba(30,41,59,.6); }
tbody td { padding: 9px 12px; color: var(--text2); vertical-align: middle; }
tbody tr.lv1 > td:first-child { border-left: 3px solid var(--blue); }
tbody tr.lv2 > td:first-child { border-left: 3px solid var(--green); }
tbody tr.lv3 > td:first-child { border-left: 3px solid var(--text3); }

/* ── WBS ID 셀 ──────────────────────── */
.wbs-id {
  font-family: var(--mono); font-size: 11px; color: var(--blue); font-weight: 600;
  white-space: nowrap;
}
.wbs-id.lv1 { color: var(--blue); }
.wbs-id.lv2 { color: var(--green); }
.wbs-id.lv3 { color: var(--text2); }

/* ── 뱃지 ───────────────────────────── */
.badge {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 700; white-space: nowrap;
}
.badge-lv1 { background: rgba(56,189,248,.15); color: var(--blue); }
.badge-lv2 { background: rgba(74,222,128,.15); color: var(--green); }
.badge-lv3 { background: rgba(148,163,184,.12); color: var(--text2); }
.badge-lv { background: rgba(100,116,139,.12); color: var(--text3); }
.badge-done  { background: rgba(74,222,128,.15); color: #4ade80; }
.badge-inprog{ background: rgba(56,189,248,.15); color: var(--blue); }
.badge-delay { background: rgba(248,113,113,.15); color: var(--red); }
.badge-wait  { background: rgba(100,116,139,.12); color: var(--text3); }

/* ── 진행률 바 ──────────────────────── */
.prog-wrap { min-width: 120px; }
.prog-labels { display: flex; justify-content: space-between; margin-bottom: 4px; }
.prog-labels span { font-family: var(--mono); font-size: 10px; }
.prog-track { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; position: relative; }
.prog-plan  { position: absolute; height: 100%; background: var(--bg3); border-radius: 2px; }
.prog-actual{ position: absolute; height: 100%; border-radius: 2px; }
.prog-actual.ok    { background: var(--green); }
.prog-actual.warn  { background: var(--yellow); }
.prog-actual.delay { background: var(--red); }
.dev-val { font-family: var(--mono); font-size: 11px; font-weight: 600; }
.dev-val.pos { color: var(--green); }
.dev-val.neg { color: var(--red); }
.dev-val.zero{ color: var(--text3); }

/* ── 카테고리 태그 ──────────────────── */
.cat-tag {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 600; white-space: nowrap;
}
.cat-0 { background:rgba(99,102,241,.15); color:#a5b4fc; }
.cat-1 { background:rgba(20,184,166,.15); color:#5eead4; }
.cat-2 { background:rgba(245,158,11,.15); color:#fcd34d; }
.cat-3 { background:rgba(239,68,68,.15);  color:#fca5a5; }
.cat-4 { background:rgba(34,197,94,.15);  color:#86efac; }
.cat-5 { background:rgba(59,130,246,.15); color:#93c5fd; }
.cat-6 { background:rgba(168,85,247,.15); color:#d8b4fe; }
.cat-7 { background:rgba(249,115,22,.15); color:#fdba74; }
.cat-8 { background:rgba(236,72,153,.15); color:#f9a8d4; }

/* ── 간트 ───────────────────────────── */
.gantt-wrap { overflow: auto; }
.gantt-container { min-width: 900px; }
.gantt-header { display: flex; }
.gantt-label-col { width: 320px; min-width: 320px; padding: 8px 12px; background: var(--bg2); border-bottom: 1px solid var(--border2); font-size: 11px; color: var(--text3); font-weight: 600; }
.gantt-timeline-header { flex: 1; display: flex; background: var(--bg2); border-bottom: 1px solid var(--border2); overflow: hidden; }
.gantt-month { flex: 1; text-align: center; font-size: 10px; color: var(--text3); padding: 8px 2px; border-right: 1px solid var(--border); font-weight: 600; }
.gantt-row { display: flex; border-bottom: 1px solid rgba(30,41,59,.6); }
.gantt-row:hover { background: rgba(30,41,59,.4); }
.gantt-label { width: 320px; min-width: 320px; padding: 7px 12px; display: flex; align-items: center; gap: 8px; }
.gantt-label-id { font-family: var(--mono); font-size: 10px; font-weight: 600; white-space: nowrap; min-width: 50px; }
.gantt-label-name { font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gantt-bar-wrap { flex: 1; position: relative; height: 36px; overflow: hidden; }
.gantt-bar {
  position: absolute; height: 12px; top: 12px; border-radius: 3px;
  display: flex; align-items: center; overflow: hidden;
}
.gantt-bar-plan { opacity: .25; }
.gantt-bar-actual {  opacity: 1; }
.gantt-today { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--yellow); opacity: .6; z-index: 5; }
.gantt-today-label { position: absolute; top: 2px; font-size: 9px; color: var(--yellow); transform: translateX(-50%); white-space: nowrap; }

/* ── 기관별 뷰 ──────────────────────── */
.org-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
.org-card { background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
.org-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.org-name { font-size: 14px; font-weight: 700; }
.org-stat { font-size: 11px; color: var(--text3); }
.org-bar-row { margin-bottom: 8px; }
.org-bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; }
.org-bar-label span { font-size: 11px; }
.org-bar-track { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.org-bar-fill { height: 100%; border-radius: 3px; }

/* ── 로딩/에러 ──────────────────────── */
.loading { text-align: center; padding: 60px; color: var(--text3); }
.loading-spin { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.3); border-radius: var(--radius); padding: 16px; color: var(--red); font-size: 13px; }

/* ── 진행 중 항목 리스트 ────────────── */
.in-prog-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 10px; margin-top: 12px; }
.in-prog-item { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px; }
.in-prog-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.in-prog-name { font-size: 12px; color: var(--text); font-weight: 500; line-height: 1.4; }
.in-prog-id { font-family: var(--mono); font-size: 10px; color: var(--blue); white-space: nowrap; }
.in-prog-prog { }

/* ── 페이지네이션 ───────────────────── */
.pagination { display: flex; gap: 4px; align-items: center; justify-content: center; padding-top: 16px; }
.page-btn { background: var(--bg2); border: 1px solid var(--border2); color: var(--text2); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-family: var(--sans); transition: all .15s; }
.page-btn:hover { background: var(--bg3); }
.page-btn.active { background: var(--blue2); border-color: var(--blue2); color: #fff; }
.page-info { font-size: 12px; color: var(--text3); padding: 0 8px; }

.section-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.name-cell { max-width: 260px; }
.name-cell-inner { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

@media (max-width: 768px) {
  .chart-grid, .chart-grid-3 { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .header-title { font-size: 13px; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <div class="header-badge">🏗️ 스마트시티 WBS</div>
    <div>
      <div class="header-title">아산시 강소형 스마트시티 조성사업 2026</div>
      <div class="header-sub">사업기간 2023.12 ~ 2026.12 · 총예산 240억원 · 제일엔지니어링 · 아산시 · 호서대 · 충남연구원 · KAIST</div>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-info" id="syncInfo"><span class="sync-dot"></span>데이터 로딩 중...</div>
    <button class="btn-refresh" onclick="reload()">↻ 새로고침</button>
  </div>
</div>

<!-- KPI -->
<div class="kpi-row" id="kpiRow">
  <div class="loading"><div class="loading-spin"></div><br>데이터 로딩 중...</div>
</div>

<!-- 탭 -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('summary',this)">📊 종합 현황</button>
  <button class="tab-btn" onclick="switchTab('table',this)">📋 전체 WBS</button>
  <button class="tab-btn" onclick="switchTab('gantt',this)">📅 간트 차트</button>
  <button class="tab-btn" onclick="switchTab('org',this)">🏢 기관별</button>
</div>

<!-- 탭: 종합 현황 -->
<div class="tab-pane active" id="tab-summary">
  <div id="summaryContent"><div class="loading"><div class="loading-spin"></div></div></div>
</div>

<!-- 탭: 전체 WBS 테이블 -->
<div class="tab-pane" id="tab-table">
  <div class="filter-bar" id="tableFilterBar">
    <label>검색</label>
    <input class="filter-input" id="searchInput" placeholder="WBS ID 또는 작업명 검색..." oninput="renderTable()">
    <div class="filter-sep"></div>
    <label>Level</label>
    <select class="filter-select" id="lvFilter" onchange="renderTable()">
      <option value="">전체</option>
      <option value="1">Level 1</option>
      <option value="2">Level 2</option>
      <option value="3">Level 3</option>
    </select>
    <label>대분류</label>
    <select class="filter-select" id="catFilter" onchange="renderTable()"></select>
    <label>상태</label>
    <select class="filter-select" id="stFilter" onchange="renderTable()">
      <option value="">전체</option>
      <option value="완료">완료</option>
      <option value="진행중">진행중</option>
      <option value="지연">지연</option>
      <option value="대기">대기</option>
    </select>
    <label>표시</label>
    <select class="filter-select" id="pageSizeSelect" onchange="renderTable()">
      <option value="30">30개</option>
      <option value="50">50개</option>
      <option value="100">100개</option>
      <option value="999">전체</option>
    </select>
    <span class="filter-count" id="filterCount"></span>
  </div>
  <div class="table-wrap">
    <table id="wbsTable">
      <thead>
        <tr>
          <th onclick="sortBy('wbsId')" style="min-width:90px">WBS ID</th>
          <th onclick="sortBy('level')" style="min-width:50px">Lv</th>
          <th onclick="sortBy('name')" style="min-width:200px">작업명</th>
          <th onclick="sortBy('category')" style="min-width:100px">대분류</th>
          <th onclick="sortBy('organization')" style="min-width:90px">담당기관</th>
          <th onclick="sortBy('startDate')" style="min-width:80px">시작일</th>
          <th onclick="sortBy('endDate')" style="min-width:80px">종료일</th>
          <th style="min-width:140px">실적/계획</th>
          <th onclick="sortBy('deviation')" style="min-width:70px">진척차</th>
          <th onclick="sortBy('manager')" style="min-width:90px">담당자</th>
          <th onclick="sortBy('status')" style="min-width:65px">상태</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- 탭: 간트 차트 -->
<div class="tab-pane" id="tab-gantt">
  <div class="filter-bar">
    <label>Level</label>
    <select class="filter-select" id="ganttLvFilter" onchange="renderGantt()">
      <option value="">1+2</option>
      <option value="1">Level 1만</option>
      <option value="2">Level 2만</option>
      <option value="123">전체(1+2+3)</option>
    </select>
    <label>대분류</label>
    <select class="filter-select" id="ganttCatFilter" onchange="renderGantt()"></select>
  </div>
  <div class="chart-card">
    <div class="gantt-wrap">
      <div class="gantt-container" id="ganttContainer"></div>
    </div>
  </div>
</div>

<!-- 탭: 기관별 -->
<div class="tab-pane" id="tab-org">
  <div id="orgContent"></div>
</div>

<script>
// ──────────────────────────────────────────────
//  상수 및 유틸
// ──────────────────────────────────────────────
const CATS = ['사업총괄','프로젝트 관리/거버넌스','실시설계','나라장터 발주 지원','서비스 구축','통합시험/시범운영','준공/검수/이관','운영(3년)','마일스톤'];
const WBS_CAT_MAP = {'1':'사업총괄','2':'프로젝트 관리/거버넌스','3':'나라장터 발주 지원','4':'서비스 구축','5':'통합시험/시범운영','6':'준공/검수/이관','7':'준공/검수/이관','8':'준공/검수/이관','9':'운영(3년)'};
const VALID_CATS = new Set(CATS);
const CAT_COLOR = {'사업총괄':0,'프로젝트 관리/거버넌스':1,'실시설계':2,'나라장터 발주 지원':3,'서비스 구축':4,'통합시험/시범운영':5,'준공/검수/이관':6,'운영(3년)':7,'마일스톤':8};
const CAT_SHORT = {'사업총괄':'사업총괄','프로젝트 관리/거버넌스':'PM/거버넌스','실시설계':'실시설계','나라장터 발주 지원':'발주지원','서비스 구축':'서비스구축','통합시험/시범운영':'통합시험','준공/검수/이관':'준공/검수','운영(3년)':'운영(3년)','마일스톤':'마일스톤'};
const ORG_COLORS = {'제일엔지니어링':'#38bdf8','아산시':'#4ade80','호서대':'#a78bfa','충남연구원':'#fbbf24','KAIST':'#fb923c','미지정':'#64748b'};
const NAME_RE = /^\[(.+?)\]\s*/;

let ALL = [], SORT_COL = 'wbsId', SORT_DIR = 1, CUR_PAGE = 1, PAGE_SIZE = 30;

function extractWbsId(name) {
  const m = NAME_RE.exec(name || '');
  return m ? m[1] : '';
}

function inferCategory(wbsId, notionCat) {
  if (notionCat && VALID_CATS.has(notionCat)) return notionCat;
  if (!wbsId) return '';
  const s = String(wbsId).trim();
  if (s.startsWith('◆')) return '마일스톤';
  return WBS_CAT_MAP[s.split('.')[0]] || '';
}

function cleanName(name) {
  return (name || '').replace(NAME_RE, '').trim();
}

function normalize(item) {
  // wbsId: 새 JSON은 wbsId 있음, 구 JSON은 id(UUID) → name에서 추출
  const wbsId = item.wbsId || extractWbsId(item.name) || item.id || '';
  const category = inferCategory(wbsId, item.category);
  return { ...item, wbsId, category };
}

function pct(v, decimals = 1) {
  if (v == null || isNaN(v)) return '–';
  return v.toFixed(decimals) + '%';
}

function devClass(v) {
  if (!v && v !== 0) return 'zero';
  if (v > 0.5) return 'pos';
  if (v < -5) return 'delay';
  if (v < 0) return 'neg';
  return 'zero';
}

function statusBadge(s) {
  const m = {'완료':'done','진행중':'inprog','지연':'delay','대기':'wait'};
  return `<span class="badge badge-${m[s]||'wait'}">${s||'대기'}</span>`;
}

function catTag(cat) {
  if (!cat) return '<span style="color:var(--text3);font-size:11px">–</span>';
  const ci = CAT_COLOR[cat] ?? 0;
  return `<span class="cat-tag cat-${ci}">${CAT_SHORT[cat]||cat.substring(0,8)}</span>`;
}

function dateStr(d) {
  if (!d) return '–';
  return String(d).substring(0, 10).replace(/-/g, '.');
}

function progressCell(plan, actual) {
  const p = plan ?? 0, a = actual ?? 0;
  const pPct = Math.min(100, p), aPct = Math.min(100, a);
  const cls = a >= p - 0.01 ? 'ok' : (p - a > 10) ? 'delay' : 'warn';
  return `<div class="prog-wrap">
    <div class="prog-labels">
      <span style="color:var(--text3)">${pct(p)}계</span>
      <span style="color:var(--${cls==='ok'?'green':cls==='delay'?'red':'yellow'})">${pct(a)}실</span>
    </div>
    <div class="prog-track">
      <div class="prog-plan" style="width:${pPct}%"></div>
      <div class="prog-actual ${cls}" style="width:${aPct}%"></div>
    </div>
  </div>`;
}

// ──────────────────────────────────────────────
//  데이터 로딩
// ──────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('data/wbs-data.json?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const json = await r.json();
    const items = json.items || [];
    ALL = items.map(normalize);
    const meta = json.meta || {};
    const kst = meta.generatedAtKst || meta.generatedAt || '';
    document.getElementById('syncInfo').innerHTML = `<span class="sync-dot"></span>마지막 동기화: ${kst || '알 수 없음'} · 총 ${ALL.length}건`;
    buildSelects();
    renderKPI(json.summary);
    renderSummary(json.summary);
    renderTable();
    renderGantt();
    renderOrg();
  } catch(e) {
    document.getElementById('kpiRow').innerHTML = `<div class="error-box">⚠️ 데이터 로드 실패: ${e.message}<br><small>GitHub Actions가 실행되었는지 확인하세요.</small></div>`;
    document.getElementById('syncInfo').innerHTML = '❌ 로드 실패';
  }
}

function reload() { window.location.reload(); }

// ──────────────────────────────────────────────
//  셀렉트 초기화
// ──────────────────────────────────────────────
function buildSelects() {
  const cats = [...new Set(ALL.map(i => i.category).filter(Boolean))].sort();
  ['catFilter','ganttCatFilter'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '<option value="">전체 대분류</option>' +
      cats.map(c => `<option value="${c}">${CAT_SHORT[c]||c}</option>`).join('');
  });
}

// ──────────────────────────────────────────────
//  KPI
// ──────────────────────────────────────────────
function renderKPI(s) {
  if (!s) { document.getElementById('kpiRow').innerHTML = ''; return; }
  const valid = ALL.filter(i => i.level && i.wbsId && i.name !== '범례');
  const total = valid.length;
  const done = valid.filter(i => i.status === '완료').length;
  const inprog = valid.filter(i => i.status === '진행중').length;
  const delay = valid.filter(i => i.status === '지연').length;
  const avgA = total ? (valid.reduce((a,i) => a + (i.actualRate||0), 0) / total) : 0;
  const avgP = total ? (valid.reduce((a,i) => a + (i.plannedRate||0), 0) / total) : 0;
  const doneRate = total ? (done / total * 100) : 0;

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi-card blue">
      <div class="kpi-label">전체 WBS 항목</div>
      <div class="kpi-value blue">${total}</div>
      <div class="kpi-sub">Level 1·2·3 유효 항목</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">완료 항목</div>
      <div class="kpi-value green">${done}</div>
      <div class="kpi-sub">${doneRate.toFixed(1)}% 완료율</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${doneRate}%;background:var(--green)"></div></div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-label">진행 중</div>
      <div class="kpi-value blue">${inprog}</div>
      <div class="kpi-sub">${total ? (inprog/total*100).toFixed(1) : 0}%</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-label">지연 항목</div>
      <div class="kpi-value red">${delay}</div>
      <div class="kpi-sub">즉시 조치 필요</div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-label">평균 실적공정률</div>
      <div class="kpi-value blue">${avgA.toFixed(1)}<span style="font-size:16px">%</span></div>
      <div class="kpi-sub">계획 ${avgP.toFixed(1)}%</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(avgA,100)}%;background:var(--blue)"></div></div>
    </div>
    <div class="kpi-card ${(avgA-avgP) >= 0 ? 'green' : 'red'}">
      <div class="kpi-label">평균 진척차</div>
      <div class="kpi-value ${(avgA-avgP) >= 0 ? 'green' : 'red'}">${(avgA-avgP) >= 0 ? '+' : ''}${(avgA-avgP).toFixed(1)}<span style="font-size:16px">%p</span></div>
      <div class="kpi-sub">${(avgA-avgP) >= 0 ? '✅ 계획 초과 달성' : '⚠️ 계획 대비 미달'}</div>
    </div>
  `;
}

// ──────────────────────────────────────────────
//  종합 현황 탭
// ──────────────────────────────────────────────
let charts = {};

function renderSummary(s) {
  const el = document.getElementById('summaryContent');
  el.innerHTML = `
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">대분류별 계획 vs 실적 공정률 (%)</div>
        <div class="chart-wrap"><canvas id="catBarChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">상태별 분포</div>
        <div class="chart-wrap"><canvas id="statusDoughnut"></canvas></div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">담당기관별 항목 수 (건)</div>
        <div class="chart-wrap"><canvas id="orgBarChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Level별 완료율 (%)</div>
        <div class="chart-wrap"><canvas id="lvChart"></canvas></div>
      </div>
    </div>
    <div class="chart-card" style="margin-bottom:16px">
      <div class="section-title">진행 중 항목 — 실적공정률 높은 순</div>
      <div class="in-prog-list" id="inProgList"></div>
    </div>
  `;
  drawCharts();
}

function drawCharts() {
  const valid = ALL.filter(i => i.level && i.wbsId && i.name !== '범례');
  const Chart = window.Chart;
  if (!Chart) return;

  // 기존 차트 파괴
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};

  const gridColor = 'rgba(100,116,139,0.2)';
  const tickColor = '#64748b';
  const opts = { responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: { x: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 10 } } },
              y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 10 } } } }
  };

  // 1. 대분류별 계획/실적
  const catData = {};
  valid.forEach(i => {
    const c = i.category || '기타';
    if (!catData[c]) catData[c] = { plan:[], actual:[] };
    catData[c].plan.push(i.plannedRate || 0);
    catData[c].actual.push(i.actualRate || 0);
  });
  const catLabels = Object.keys(catData).filter(c => VALID_CATS.has(c) || c === '기타');
  const catPlan = catLabels.map(c => {
    const arr = catData[c].plan; return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
  });
  const catActual = catLabels.map(c => {
    const arr = catData[c].actual; return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
  });
  charts.cat = new Chart(document.getElementById('catBarChart'), {
    type: 'bar',
    data: { labels: catLabels.map(c => CAT_SHORT[c] || c.substring(0,8)),
      datasets: [
        { label:'계획', data: catPlan, backgroundColor:'rgba(56,189,248,.3)', borderColor:'rgba(56,189,248,.7)', borderWidth:1, borderRadius:3 },
        { label:'실적', data: catActual, backgroundColor:'rgba(74,222,128,.3)', borderColor:'rgba(74,222,128,.7)', borderWidth:1, borderRadius:3 }
      ]
    },
    options: { ...opts, plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 11 } } } },
      scales: { ...opts.scales, y: { ...opts.scales.y, max: 100, ticks: { ...opts.scales.y.ticks, callback: v => v + '%' } } }
    }
  });

  // 2. 상태별 도넛
  const stCounts = { '완료': 0, '진행중': 0, '지연': 0, '대기': 0 };
  valid.forEach(i => { const k = i.status || '대기'; if (k in stCounts) stCounts[k]++; });
  charts.status = new Chart(document.getElementById('statusDoughnut'), {
    type: 'doughnut',
    data: { labels: Object.keys(stCounts),
      datasets: [{ data: Object.values(stCounts),
        backgroundColor: ['rgba(74,222,128,.7)','rgba(56,189,248,.7)','rgba(248,113,113,.7)','rgba(100,116,139,.5)'],
        borderWidth: 1, borderColor: '#0f172a', hoverOffset: 4
      }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'bottom', labels: { color: '#94a3b8', padding: 10, font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw}건` } }
      }
    }
  });

  // 3. 기관별 바차트
  const orgData = {};
  valid.forEach(i => {
    const o = i.organization || '미지정';
    if (!orgData[o]) orgData[o] = 0;
    orgData[o]++;
  });
  const orgLabels = Object.keys(orgData).sort((a,b) => orgData[b] - orgData[a]);
  charts.org = new Chart(document.getElementById('orgBarChart'), {
    type: 'bar',
    data: { labels: orgLabels,
      datasets: [{ data: orgLabels.map(o => orgData[o]),
        backgroundColor: orgLabels.map(o => ORG_COLORS[o] || '#64748b'),
        borderRadius: 3, borderWidth: 0
      }]
    },
    options: { ...opts, indexAxis: 'y',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw}건` } } },
      scales: { y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 } } },
                x: { grid: { color: gridColor }, ticks: { color: tickColor } } }
    }
  });

  // 4. Level별 완료율
  const lvData = {};
  valid.forEach(i => {
    const l = 'Level ' + (i.level||'?');
    if (!lvData[l]) lvData[l] = { done: 0, total: 0 };
    lvData[l].total++;
    if (i.status === '완료') lvData[l].done++;
  });
  const lvLabels = Object.keys(lvData).sort();
  charts.lv = new Chart(document.getElementById('lvChart'), {
    type: 'bar',
    data: { labels: lvLabels,
      datasets: [{ label:'완료율', data: lvLabels.map(l => lvData[l].total ? lvData[l].done/lvData[l].total*100 : 0),
        backgroundColor: ['rgba(56,189,248,.6)','rgba(74,222,128,.6)','rgba(167,139,250,.6)'],
        borderRadius: 6, borderWidth: 0
      }]
    },
    options: { ...opts,
      plugins: { legend: { display: false }, datalabels: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.raw.toFixed(1)}%` } }
      },
      scales: { ...opts.scales, y: { ...opts.scales.y, max: 100, ticks: { ...opts.scales.y.ticks, callback: v => v + '%' } } }
    }
  });

  // 진행 중 항목 리스트
  const inProg = valid.filter(i => i.status === '진행중' || i.actualRate > 0 && i.actualRate < 100)
    .sort((a,b) => (b.actualRate||0) - (a.actualRate||0)).slice(0, 18);
  document.getElementById('inProgList').innerHTML = inProg.map(i => {
    const a = i.actualRate || 0, p = i.plannedRate || 0;
    const cls = a >= p ? 'ok' : (p - a > 10) ? 'delay' : 'warn';
    const color = cls === 'ok' ? 'var(--green)' : cls === 'delay' ? 'var(--red)' : 'var(--yellow)';
    return `<div class="in-prog-item">
      <div class="in-prog-top">
        <div class="in-prog-name">${cleanName(i.name).substring(0,40)}</div>
        <div class="in-prog-id">${i.wbsId}</div>
      </div>
      <div class="prog-labels" style="margin-bottom:4px">
        <span style="font-size:10px;color:var(--text3)">계획 ${pct(p)}</span>
        <span style="font-size:10px;color:${color};font-weight:700">실적 ${pct(a)}</span>
      </div>
      <div class="prog-track"><div class="prog-actual ${cls}" style="width:${Math.min(a,100)}%"></div></div>
    </div>`;
  }).join('');
}

// ──────────────────────────────────────────────
//  테이블 렌더링
// ──────────────────────────────────────────────
function sortBy(col) {
  if (SORT_COL === col) SORT_DIR *= -1;
  else { SORT_COL = col; SORT_DIR = 1; }
  CUR_PAGE = 1;
  renderTable();
}

function getFiltered() {
  const q   = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const lv  = document.getElementById('lvFilter')?.value || '';
  const cat = document.getElementById('catFilter')?.value || '';
  const st  = document.getElementById('stFilter')?.value || '';

  return ALL.filter(i => {
    if (lv  && i.level !== lv) return false;
    if (cat && i.category !== cat) return false;
    if (st  && i.status !== st) return false;
    if (q) {
      const wid = (i.wbsId || '').toLowerCase();
      const nm  = (i.name || '').toLowerCase();
      const mgr = (i.manager || '').toLowerCase();
      if (!wid.includes(q) && !nm.includes(q) && !mgr.includes(q)) return false;
    }
    return true;
  });
}

function renderTable() {
  PAGE_SIZE = parseInt(document.getElementById('pageSizeSelect')?.value || 30);
  let data = getFiltered();

  // 정렬
  const sd = SORT_DIR;
  data.sort((a, b) => {
    let av = a[SORT_COL] ?? '', bv = b[SORT_COL] ?? '';
    if (SORT_COL === 'wbsId') {
      // WBS ID 자연순 (1.2.3 형식)
      const ap = (av+'').split('.').map(n => isNaN(n) ? n : n.padStart(4,'0')).join('.');
      const bp = (bv+'').split('.').map(n => isNaN(n) ? n : n.padStart(4,'0')).join('.');
      return ap < bp ? -sd : ap > bp ? sd : 0;
    }
    if (typeof av === 'number') return (av - bv) * sd;
    return String(av).localeCompare(String(bv), 'ko') * sd;
  });

  // 정렬 헤더 표시
  document.querySelectorAll('#wbsTable thead th').forEach(th => {
    th.className = th.className.replace(' sort-asc','').replace(' sort-desc','');
  });

  const total = data.length;
  document.getElementById('filterCount').textContent = `${total}건`;

  // 페이지네이션
  const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
  if (CUR_PAGE > totalPages) CUR_PAGE = totalPages;
  const start = (CUR_PAGE - 1) * PAGE_SIZE;
  const pageData = data.slice(start, start + PAGE_SIZE);

  // tbody
  document.getElementById('tableBody').innerHTML = pageData.map(i => {
    const wid = i.wbsId || '–';
    const lvCls = i.level ? `lv${i.level}` : 'lv';
    const indent = i.level === '2' ? 8 : i.level === '3' ? 16 : 0;
    const taskName = cleanName(i.name) || i.name || '–';
    const dev = i.deviation ?? null;
    const devStr = dev !== null ? `<span class="dev-val ${dev > 0 ? 'pos' : dev < 0 ? 'neg' : 'zero'}">${dev > 0 ? '+' : ''}${pct(dev)}</span>` : '–';

    return `<tr class="${lvCls}">
      <td><span class="wbs-id ${lvCls}">${wid}</span></td>
      <td>${i.level ? `<span class="badge badge-lv${i.level}">${i.level}</span>` : '<span class="badge badge-lv">–</span>'}</td>
      <td class="name-cell"><span class="name-cell-inner" style="padding-left:${indent}px" title="${taskName}">${taskName}</span></td>
      <td>${catTag(i.category)}</td>
      <td><span style="font-size:11px;color:${ORG_COLORS[i.organization]||'var(--text3)'}">${i.organization||'–'}</span></td>
      <td style="font-size:11px;color:var(--text3);white-space:nowrap">${dateStr(i.startDate)}</td>
      <td style="font-size:11px;color:var(--text3);white-space:nowrap">${dateStr(i.endDate)}</td>
      <td>${progressCell(i.plannedRate, i.actualRate)}</td>
      <td style="text-align:center">${devStr}</td>
      <td style="font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px">${i.manager||'–'}</td>
      <td>${statusBadge(i.status)}</td>
    </tr>`;
  }).join('');

  // 페이지네이션 버튼
  const pEl = document.getElementById('pagination');
  if (totalPages <= 1) { pEl.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${CUR_PAGE-1})" ${CUR_PAGE===1?'disabled':''}>◀</button>`;
  const range = 3;
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || (p >= CUR_PAGE - range && p <= CUR_PAGE + range)) {
      html += `<button class="page-btn ${p===CUR_PAGE?'active':''}" onclick="goPage(${p})">${p}</button>`;
    } else if (p === CUR_PAGE - range - 1 || p === CUR_PAGE + range + 1) {
      html += `<span class="page-info">…</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${CUR_PAGE+1})" ${CUR_PAGE===totalPages?'disabled':''}>▶</button>`;
  html += `<span class="page-info">${start+1}–${Math.min(start+PAGE_SIZE,total)} / ${total}건</span>`;
  pEl.innerHTML = html;
}

function goPage(p) {
  const total = getFiltered().length;
  const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
  CUR_PAGE = Math.max(1, Math.min(p, totalPages));
  renderTable();
  document.getElementById('tab-table').scrollTop = 0;
}

// ──────────────────────────────────────────────
//  간트 차트
// ──────────────────────────────────────────────
function renderGantt() {
  const lvF  = document.getElementById('ganttLvFilter')?.value || '';
  const catF = document.getElementById('ganttCatFilter')?.value || '';

  let items = ALL.filter(i => i.startDate && i.endDate && i.wbsId && i.name !== '범례');

  if (!lvF || lvF === '') {
    items = items.filter(i => i.level === '1' || i.level === '2');
  } else if (lvF === '123') {
    // 전체
  } else {
    items = items.filter(i => i.level === lvF);
  }
  if (catF) items = items.filter(i => i.category === catF);

  // WBS ID 자연순 정렬
  items.sort((a, b) => {
    const ap = (a.wbsId+'').split('.').map(n => isNaN(n)?n:n.padStart(4,'0')).join('.');
    const bp = (b.wbsId+'').split('.').map(n => isNaN(n)?n:n.padStart(4,'0')).join('.');
    return ap < bp ? -1 : ap > bp ? 1 : 0;
  });

  if (!items.length) {
    document.getElementById('ganttContainer').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">표시할 항목이 없습니다</div>';
    return;
  }

  // 기간 계산
  const allDates = items.flatMap(i => [new Date(i.startDate), new Date(i.endDate)]).filter(d => !isNaN(d));
  const minDate = new Date(Math.min(...allDates));
  const maxDate = new Date(Math.max(...allDates));
  minDate.setDate(1); // 월 시작
  maxDate.setMonth(maxDate.getMonth() + 1, 1); // 다음 달 1일

  const totalMs = maxDate - minDate;
  const months = [];
  let cur = new Date(minDate);
  while (cur < maxDate) {
    months.push(new Date(cur));
    cur.setMonth(cur.getMonth() + 1);
  }

  const today = new Date();
  const todayPct = Math.max(0, Math.min(100, (today - minDate) / totalMs * 100));

  function toPct(d) {
    if (!d) return 0;
    return Math.max(0, Math.min(100, (new Date(d) - minDate) / totalMs * 100));
  }
  function widthPct(s, e) {
    if (!s || !e) return 0;
    return Math.max(0.5, toPct(e) - toPct(s));
  }

  const headerHtml = `<div class="gantt-header">
    <div class="gantt-label-col">WBS 항목</div>
    <div class="gantt-timeline-header">
      ${months.map(m => `<div class="gantt-month">${m.getFullYear()}.${String(m.getMonth()+1).padStart(2,'0')}</div>`).join('')}
    </div>
  </div>`;

  const rowsHtml = items.map(i => {
    const color = i.level === '1' ? 'var(--blue)' : i.level === '2' ? 'var(--green)' : '#94a3b8';
    const indent = i.level === '2' ? 12 : i.level === '3' ? 20 : 0;
    const sp = toPct(i.startDate), wp = widthPct(i.startDate, i.endDate);
    const ap = Math.min(wp, wp * ((i.actualRate||0)/100));
    const cls = (i.actualRate||0) >= (i.plannedRate||0) ? 'var(--green)' : 'var(--red)';
    const statusDot = i.status === '완료' ? '✅' : i.status === '지연' ? '🔴' : i.status === '진행중' ? '🔵' : '⬜';

    return `<div class="gantt-row">
      <div class="gantt-label" style="padding-left:${indent+12}px">
        <span class="gantt-label-id" style="color:${color}">${i.wbsId}</span>
        <span class="gantt-label-name" title="${cleanName(i.name)}">${statusDot} ${cleanName(i.name).substring(0, i.level==='1'?22:18)}</span>
      </div>
      <div class="gantt-bar-wrap">
        <div class="gantt-today" style="left:${todayPct}%"></div>
        <!-- 계획 (회색 배경) -->
        <div class="gantt-bar gantt-bar-plan" style="left:${sp}%;width:${wp}%;background:${color}"></div>
        <!-- 실적 -->
        <div class="gantt-bar gantt-bar-actual" style="left:${sp}%;width:${ap}%;background:${cls}"></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('ganttContainer').innerHTML = headerHtml + `<div style="position:relative">${rowsHtml}</div>`;
}

// ──────────────────────────────────────────────
//  기관별
// ──────────────────────────────────────────────
function renderOrg() {
  const valid = ALL.filter(i => i.level && i.wbsId && i.name !== '범례');
  const orgs = {};
  valid.forEach(i => {
    const o = i.organization || '미지정';
    if (!orgs[o]) orgs[o] = { items: [], done: 0, inprog: 0, delay: 0 };
    orgs[o].items.push(i);
    if (i.status === '완료')   orgs[o].done++;
    if (i.status === '진행중') orgs[o].inprog++;
    if (i.status === '지연')   orgs[o].delay++;
  });

  const html = Object.entries(orgs).sort((a,b) => b[1].items.length - a[1].items.length).map(([org, d]) => {
    const total = d.items.length;
    const avgA = total ? d.items.reduce((a,i)=>a+(i.actualRate||0),0)/total : 0;
    const avgP = total ? d.items.reduce((a,i)=>a+(i.plannedRate||0),0)/total : 0;
    const color = ORG_COLORS[org] || '#64748b';
    const topCats = {};
    d.items.forEach(i => { const c = i.category||'기타'; topCats[c] = (topCats[c]||0)+1; });
    const catList = Object.entries(topCats).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([c,n]) => `${CAT_SHORT[c]||c}(${n})`).join(', ');

    return `<div class="org-card">
      <div class="org-header">
        <div class="org-name" style="color:${color}">${org}</div>
        <div class="org-stat">${total}건</div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <span class="badge badge-done">완료 ${d.done}</span>
        <span class="badge badge-inprog">진행 ${d.inprog}</span>
        <span class="badge badge-delay">지연 ${d.delay}</span>
      </div>
      <div class="org-bar-row">
        <div class="org-bar-label">
          <span style="color:var(--text3)">평균 실적</span>
          <span style="color:${color};font-family:var(--mono);font-weight:600">${avgA.toFixed(1)}%</span>
        </div>
        <div class="org-bar-track"><div class="org-bar-fill" style="width:${Math.min(avgA,100)}%;background:${color}"></div></div>
      </div>
      <div class="org-bar-row">
        <div class="org-bar-label">
          <span style="color:var(--text3)">평균 계획</span>
          <span style="color:var(--text2);font-family:var(--mono)">${avgP.toFixed(1)}%</span>
        </div>
        <div class="org-bar-track"><div class="org-bar-fill" style="width:${Math.min(avgP,100)}%;background:var(--bg3)"></div></div>
      </div>
      <div style="font-size:10px;color:var(--text3);margin-top:10px">${catList}</div>
    </div>`;
  }).join('');

  document.getElementById('orgContent').innerHTML = `<div class="org-grid">${html}</div>`;
}

// ──────────────────────────────────────────────
//  탭 전환
// ──────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'summary') drawCharts();
  if (name === 'gantt')   renderGantt();
}

// 시작
loadData();
</script>
