<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아산 스마트시티 WBS 대시보드 2026</title>
<style>
:root{
  --primary:#1e3a5f;--accent:#2563eb;--green:#16a34a;--yellow:#ca8a04;
  --red:#dc2626;--gray:#6b7280;--light:#f8fafc;--border:#e2e8f0;
  --card:#ffffff;--shadow:0 1px 3px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',system-ui,sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
/* 헤더 */
.header{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);color:#fff;padding:16px 24px;
  display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{font-size:18px;font-weight:700}
.header .subtitle{font-size:12px;opacity:.8;margin-top:2px}
.header .meta{text-align:right;font-size:11px;opacity:.75}
/* KPI 카드 */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;padding:16px 24px}
.kpi{background:var(--card);border-radius:8px;padding:14px;box-shadow:var(--shadow);border-left:4px solid var(--accent)}
.kpi.green{border-color:var(--green)}.kpi.yellow{border-color:var(--yellow)}.kpi.red{border-color:var(--red)}
.kpi-label{font-size:11px;color:var(--gray);margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:700;color:var(--primary)}
.kpi-sub{font-size:11px;color:var(--gray);margin-top:2px}
/* 차트 영역 */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 24px 16px}
.chart-card{background:var(--card);border-radius:8px;padding:16px;box-shadow:var(--shadow)}
.chart-title{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--border)}
/* 진행바 */
.bar-row{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.bar-track{background:#e2e8f0;border-radius:999px;height:8px;position:relative}
.bar-plan{position:absolute;top:0;left:0;height:100%;background:#93c5fd;border-radius:999px;opacity:.6}
.bar-actual{position:absolute;top:0;left:0;height:100%;background:var(--accent);border-radius:999px}
/* 테이블 */
.table-section{padding:0 24px 24px}
.table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.table-header h2{font-size:14px;font-weight:600;color:var(--primary)}
.controls{display:flex;gap:8px;flex-wrap:wrap}
.controls input,.controls select{
  padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;
  background:#fff;cursor:pointer;outline:none}
.controls input:focus,.controls select:focus{border-color:var(--accent)}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;
  box-shadow:var(--shadow);overflow:hidden}
thead th{background:var(--primary);color:#fff;padding:10px 8px;text-align:left;
  font-size:12px;font-weight:600;white-space:nowrap}
tbody tr:hover{background:#f0f7ff}
tbody tr:nth-child(even){background:#f8fafc}
tbody tr:nth-child(even):hover{background:#e8f0ff}
td{padding:8px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle}
/* 레벨 배지 */
.lv{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
.lv-1{background:#dbeafe;color:#1d4ed8}
.lv-2{background:#dcfce7;color:#15803d}
.lv-3{background:#fef9c3;color:#92400e}
/* 상태 배지 */
.st{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.st-완료{background:#dcfce7;color:#15803d}
.st-진행중{background:#dbeafe;color:#1d4ed8}
.st-대기{background:#f1f5f9;color:#64748b}
.st-지연{background:#fee2e2;color:#dc2626}
/* 페이지네이션 */
.paging{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;
  background:var(--card);border-top:1px solid var(--border);font-size:12px;color:var(--gray)}
.paging button{padding:5px 12px;border:1px solid var(--border);border-radius:6px;
  background:#fff;cursor:pointer;font-size:12px}
.paging button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.paging button:disabled{opacity:.4;cursor:default}
/* 갱신 버튼 */
.refresh-btn{padding:6px 14px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);
  border-radius:6px;color:#fff;cursor:pointer;font-size:12px}
.refresh-btn:hover{background:rgba(255,255,255,.35)}
/* 로딩 */
.loading{text-align:center;padding:60px;color:var(--gray);font-size:16px}
/* 기관 그리드 */
.org-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.org-item{background:#f8fafc;border-radius:6px;padding:10px;text-align:center}
.org-name{font-size:12px;font-weight:600;color:var(--primary);margin-bottom:4px}
.org-count{font-size:11px;color:var(--gray)}
.org-bar{background:#e2e8f0;border-radius:4px;height:6px;margin-top:6px}
.org-bar-fill{background:var(--accent);border-radius:4px;height:100%}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏗️ 아산 스마트시티 WBS 대시보드 2026</h1>
    <div class="subtitle">아산시 강소형 스마트시티 조성사업 | 사업기간: 2023.12 ~ 2026.12</div>
  </div>
  <div class="meta">
    <button class="refresh-btn" onclick="location.reload()">↻ 새로고침</button>
    <div id="last-updated" style="margin-top:4px">데이터 로딩 중...</div>
  </div>
</div>

<div id="kpi-area" class="kpi-grid">
  <div class="loading" style="grid-column:1/-1">📡 WBS 데이터 로딩 중...</div>
</div>

<div id="charts-area" class="charts" style="display:none"></div>

<div class="table-section">
  <div class="table-header">
    <h2>📋 WBS 세부 항목</h2>
    <div class="controls">
      <input id="search" type="text" placeholder="🔍 WBS ID / 작업명 검색" oninput="applyFilter()">
      <select id="fLevel" onchange="applyFilter()">
        <option value="">전체 Level</option>
        <option value="1">Level 1</option>
        <option value="2">Level 2</option>
        <option value="3">Level 3</option>
      </select>
      <select id="fCat" onchange="applyFilter()">
        <option value="">전체 대분류</option>
      </select>
      <select id="fOrg" onchange="applyFilter()">
        <option value="">전체 기관</option>
      </select>
      <select id="fStatus" onchange="applyFilter()">
        <option value="">전체 상태</option>
        <option value="완료">완료</option>
        <option value="진행중">진행중</option>
        <option value="대기">대기</option>
        <option value="지연">지연</option>
      </select>
    </div>
  </div>
  <table id="wbs-table">
    <thead>
      <tr>
        <th>WBS ID</th><th>Lv</th><th style="min-width:180px">작업명</th>
        <th>대분류</th><th>담당기관</th><th>시작일</th><th>종료일</th>
        <th>계획(%)</th><th>실적(%)</th><th>진척차</th><th>담당자</th><th>상태</th>
      </tr>
    </thead>
    <tbody id="wbs-body"><tr><td colspan="12" class="loading">로딩 중...</td></tr></tbody>
  </table>
  <div class="paging">
    <span id="paging-info"></span>
    <div>
      <button onclick="goPage(-1)" id="btn-prev">◀ 이전</button>
      <span id="page-num" style="margin:0 10px"></span>
      <button onclick="goPage(1)" id="btn-next">다음 ▶</button>
    </div>
    <select onchange="changePageSize(this.value)" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px">
      <option value="30">30개씩</option>
      <option value="50">50개씩</option>
      <option value="100">100개씩</option>
    </select>
  </div>
</div>

<script>
let allItems=[], filtered=[], pageSize=30, currentPage=1;

// 데이터 로드 — data/wbs-data.json
async function loadData(){
  try{
    const r=await fetch('data/wbs-data.json?_='+ Date.now());
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    if(!d.items?.length) throw new Error('데이터 없음');
    return d;
  }catch(e){
    console.error(e);
    return null;
  }
}

function fmtPct(v){
  if(v===null||v===undefined) return '-';
  return v.toFixed(1)+'%';
}
function pctColor(v){
  if(v===null||v===undefined) return '';
  if(v>=100) return 'color:#16a34a;font-weight:700';
  if(v>=70)  return 'color:#2563eb';
  if(v>=40)  return 'color:#ca8a04';
  return 'color:#dc2626';
}
function devColor(v){
  if(v===null||v===undefined) return '';
  if(v>=0) return 'color:#16a34a';
  return 'color:#dc2626;font-weight:600';
}
function getStatus(item){
  const a=item.actualRate, p=item.plannedRate;
  if(a===null||a===undefined) return item.status||'대기';
  if(a>=100) return '완료';
  if(a>0 && p!==null && a<p-5) return '지연';
  if(a>0) return '진행중';
  return '대기';
}

function renderKPI(summary){
  const {total,done,inProg,avgPlan,avgActual,avgDev}=summary;
  const delayed=allItems.filter(i=>getStatus(i)==='지연').length;
  document.getElementById('kpi-area').innerHTML=`
    <div class="kpi"><div class="kpi-label">전체 항목</div><div class="kpi-value">${total}</div><div class="kpi-sub">WBS 전체</div></div>
    <div class="kpi green"><div class="kpi-label">완료</div><div class="kpi-value">${done}</div><div class="kpi-sub">${total?Math.round(done/total*100):0}%</div></div>
    <div class="kpi"><div class="kpi-label">진행중</div><div class="kpi-value">${inProg}</div><div class="kpi-sub">처리 중</div></div>
    <div class="kpi red"><div class="kpi-label">지연</div><div class="kpi-value">${delayed}</div><div class="kpi-sub">계획 대비</div></div>
    <div class="kpi yellow"><div class="kpi-label">평균 계획(%)</div><div class="kpi-value">${avgPlan}%</div><div class="kpi-sub">계획공정률</div></div>
    <div class="kpi"><div class="kpi-label">평균 실적(%)</div><div class="kpi-value">${avgActual}%</div><div class="kpi-sub">실적공정률</div></div>
  `;
}

function renderCharts(summary){
  const {byCategory,byOrg}=summary;
  const ca=document.getElementById('charts-area');
  ca.style.display='grid';

  // 대분류 차트
  const cats=Object.entries(byCategory).filter(([,v])=>v.avgActual!==undefined);
  const catHtml=cats.map(([name,v])=>`
    <div class="bar-row">
      <div class="bar-label">
        <span>${name}</span>
        <span style="font-weight:600">${v.avgActual}% <span style="opacity:.6;font-size:11px">/ 계획 ${v.avgPlan}%</span></span>
      </div>
      <div class="bar-track">
        <div class="bar-plan" style="width:${Math.min(v.avgPlan,100)}%"></div>
        <div class="bar-actual" style="width:${Math.min(v.avgActual,100)}%"></div>
      </div>
    </div>`).join('');

  // 기관 카드
  const orgs=Object.entries(byOrg);
  const maxCnt=Math.max(...orgs.map(([,v])=>v.count),1);
  const orgHtml=`<div class="org-grid">${orgs.map(([name,v])=>`
    <div class="org-item">
      <div class="org-name">${name}</div>
      <div class="org-count">${v.count}건 | 완료 ${v.done} | 진행 ${v.inProg}</div>
      <div class="org-bar"><div class="org-bar-fill" style="width:${Math.round(v.count/maxCnt*100)}%"></div></div>
    </div>`).join('')}</div>`;

  ca.innerHTML=`
    <div class="chart-card">
      <div class="chart-title">📈 대분류별 계획 vs 실적 공정률</div>
      ${catHtml||'<div style="color:var(--gray);text-align:center;padding:20px">대분류 데이터 없음</div>'}
    </div>
    <div class="chart-card">
      <div class="chart-title">🏢 담당기관별 WBS 현황</div>
      ${orgHtml||'<div style="color:var(--gray);text-align:center;padding:20px">기관 데이터 없음</div>'}
    </div>`;
}

function populateFilters(items){
  const cats=[...new Set(items.map(i=>i.category).filter(Boolean))].sort();
  const orgs=[...new Set(items.map(i=>i.organization).filter(Boolean))].sort();
  const fc=document.getElementById('fCat');
  const fo=document.getElementById('fOrg');
  cats.forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;fc.appendChild(o)});
  orgs.forEach(o=>{const op=document.createElement('option');op.value=op.textContent=o;fo.appendChild(op)});
}

function applyFilter(){
  const q=document.getElementById('search').value.toLowerCase();
  const lv=document.getElementById('fLevel').value;
  const cat=document.getElementById('fCat').value;
  const org=document.getElementById('fOrg').value;
  const st=document.getElementById('fStatus').value;
  filtered=allItems.filter(i=>{
    if(q&&!i.id.toLowerCase().includes(q)&&!i.name.toLowerCase().includes(q)) return false;
    if(lv&&i.level!==lv) return false;
    if(cat&&i.category!==cat) return false;
    if(org&&i.organization!==org) return false;
    const status=getStatus(i);
    if(st&&status!==st) return false;
    return true;
  });
  currentPage=1;
  renderTable();
}

function renderTable(){
  const start=(currentPage-1)*pageSize;
  const page=filtered.slice(start,start+pageSize);
  const tbody=document.getElementById('wbs-body');
  if(!page.length){
    tbody.innerHTML='<tr><td colspan="12" style="text-align:center;padding:30px;color:var(--gray)">검색 결과 없음</td></tr>';
  } else {
    tbody.innerHTML=page.map(i=>{
      const status=getStatus(i);
      const dev=i.deviation;
      const devStr=dev!==null&&dev!==undefined?(dev>=0?'+':'')+dev.toFixed(1)+'%':'-';
      return `<tr>
        <td style="font-weight:600;color:var(--accent)">${i.id}</td>
        <td><span class="lv lv-${i.level||'1'}">${i.level||'-'}</span></td>
        <td>${i.name}</td>
        <td style="font-size:11px">${i.category||'-'}</td>
        <td style="font-size:11px">${i.organization||'-'}</td>
        <td style="font-size:11px">${i.startDate||'-'}</td>
        <td style="font-size:11px">${i.endDate||'-'}</td>
        <td style="${pctColor(i.plannedRate)}">${fmtPct(i.plannedRate)}</td>
        <td style="${pctColor(i.actualRate)}">${fmtPct(i.actualRate)}</td>
        <td style="${devColor(dev)}">${devStr}</td>
        <td style="font-size:11px">${i.manager||'-'}</td>
        <td><span class="st st-${status}">${status}</span></td>
      </tr>`;
    }).join('');
  }
  const total=filtered.length;
  const totalPages=Math.ceil(total/pageSize)||1;
  document.getElementById('paging-info').textContent=
    `${total}건 중 ${Math.min(start+1,total)}~${Math.min(start+pageSize,total)}번째 표시`;
  document.getElementById('page-num').textContent=`${currentPage} / ${totalPages}`;
  document.getElementById('btn-prev').disabled=currentPage<=1;
  document.getElementById('btn-next').disabled=currentPage>=totalPages;
}

function goPage(d){
  const tot=Math.ceil(filtered.length/pageSize)||1;
  currentPage=Math.max(1,Math.min(tot,currentPage+d));
  renderTable();
}
function changePageSize(v){pageSize=parseInt(v);currentPage=1;renderTable();}

// 메인 초기화
(async()=>{
  const data=await loadData();
  if(!data){
    document.getElementById('kpi-area').innerHTML=
      '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#dc2626">'+
      '❌ 데이터 로드 실패 — GitHub Actions가 아직 실행되지 않았거나 NOTION_API_KEY Secret이 미설정 상태입니다.<br>'+
      '<small style="color:#6b7280;margin-top:8px;display:block">GitHub → Actions → 🔄 Notion WBS 자동 동기화 → Run workflow 수동 실행</small></div>';
    return;
  }

  allItems=[...data.items];
  filtered=[...allItems];

  // KPI
  renderKPI(data.summary);

  // 차트
  renderCharts(data.summary);

  // 필터 옵션 채우기
  populateFilters(allItems);

  // 테이블
  renderTable();

  // 갱신 시각
  document.getElementById('last-updated').textContent=
    '📅 ' + (data.meta.generatedAtKst||data.meta.generatedAt||'');
})();
</script>
</body>
</html>
